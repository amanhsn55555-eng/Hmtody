.menu-modal *,

.settings-icon i,
.close-btn i {

/* تعديل الهوامش لتتناسب مع الوضع الجديد */

    margin-left: 5px !important;

    /* ========== هيدر علوي مصغر ========== */

    /* ========== المحتوى ========== */
    .app-container {

    /* بطاقة منشور */
    .post-card {
      background: linear-gradient(145deg, #ffffff 0%, #fbfdff 100%);
      border-radius: 24px;
      padding: 16px 14px 14px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px -8px rgba(0, 20, 60, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.9);
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }

    .post-card.promoted {
      border: 2px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(135deg, #fbbf24, #ec4899, #8b5cf6) border-box;
    }

    .post-card.promoted::before {
      content: "✨ مروّج ✨";
      position: absolute;
      top: 10px;
      left: 14px;
      background: linear-gradient(135deg, #fbbf24, #ec4899);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .follow-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;

      width: 48px;

      display: flex;
      align-items: center;
      justify-content: center;

      box-shadow: 0 6px 15px -4px rgba(99, 102, 241, 0.2);
      border: 3px solid white;

      overflow: hidden;

    /* ========== هيدر سفلي ========== */
    .compact-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 6px 8px 10px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(251, 191, 36, 0.15);
      box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.03);
      z-index: 1000;
      border-radius: 25px 25px 0 0;
    }

    .footer-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #64748b;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 15px;
      min-width: 60px;
      transition: all 0.3s;
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      border: 1px solid rgba(251, 191, 36, 0.15);
      position: relative;
      overflow: hidden;
    }

    .footer-icon::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(251, 191, 36, 0.4), transparent);
      transform: rotate(45deg);
      animation: lightMove 3s infinite;
    }

    @keyframes lightMove {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .footer-icon i { font-size: 22px; margin-bottom: 3px; position: relative; z-index: 1; }

/* ========== إخفاء نصوص الترند والأفضل وإظهار أيقونات فقط ========== */

  
/* إخفاء النص الأصلي */

/* الترند #1 - 🔥 */

.trend-badge[style*="background: #dc2626"]::before {
    content: "🌧️" !important;
    font-size: 14px !important;
    color: #dc2626 !important;
    background: transparent !important;
    position: absolute !important;
    top: 50% !important;
    left: 50% !important;

.trend-badge[style*="background: #10b981"]::before {

    color: #10b981 !important;

}

/* ========== تأثيرات الحركة ========== */

@keyframes fireGlow {
    from { 
        text-shadow: 0 0 5px #dc2626, 0 0 10px #ef4444;
        transform: translate(-50%, -50%) scale(1); 
    }
    to { 
        text-shadow: 0 0 20px #dc2626, 0 0 40px #ef4444;
        transform: translate(-50%, -50%) scale(1.2); 
    }
}

@keyframes boltFlash {
    0%, 100% { 
        text-shadow: 0 0 10px #10b981, 0 0 20px #34d399;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    50% { 
        text-shadow: 0 0 30px #10b981, 0 0 60px #34d399;
        opacity: 0.7;
        transform: translate(-50%, -50%) scale(1.3);
    }
}

@keyframes starSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes starTwinkle {
    0%, 100% { 
        text-shadow: 0 0 5px currentColor, 0 0 10px currentColor;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    50% { 
        text-shadow: 0 0 25px currentColor, 0 0 50px currentColor;
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1.2);
    }
}

@keyframes diamondShine {
    0%, 100% { 
        text-shadow: 0 0 10px #3b82f6, 0 0 20px #93c5fd;
        filter: brightness(1);
        transform: translate(-50%, -50%) scale(1);
    }
    50% { 
        text-shadow: 0 0 30px #3b82f6, 0 0 60px #bfdbfe;
        filter: brightness(1.5);
        transform: translate(-50%, -50%) scale(1.15);
    }
}

/* ========== إخفاء أي نصوص إضافية ========== */
.trend-badge::after {
    display: none !important;
}

  function playNotificationSound() {
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioContext.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 400;
      const osc2 = audioContext.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.value = 800;
      const gainNode = audioContext.createGain();
      const gainNode2 = audioContext.createGain();
      osc.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioContext.destination);
      gainNode2.connect(audioContext.destination);
      const now = audioContext.currentTime;
      gainNode.gain.setValueAtTime(0.1, now);
      gainNode2.gain.setValueAtTime(0.05, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      gainNode2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      osc.start(now);
      osc2.start(now);
      osc.stop(now + 0.15);
      osc2.stop(now + 0.15);
    } catch (e) {}
  }

  function calculateTrendingPosts() {
      const now = Date.now();
      const twentyFourHoursAgo = now - 86400000;
      
      const recentPosts = posts.filter(p => p.timestamp > twentyFourHoursAgo);
      
      const sorted = [...recentPosts].sort((a, b) => (b.likes || 0) - (a.likes || 0));
      
      const topPromoted = sorted.filter(p => (p.promotedUntil || 0) > now).slice(0, 3);
      const topOrganic = sorted.filter(p => !((p.promotedUntil || 0) > now)).slice(0, 3);
      
      return { topPromoted, topOrganic };
  }

  function renderPosts() {
    const container = document.getElementById('postsContainer');
    if (!container) return;
    
    let filtered = posts.filter(p => 
      (p.content || '').includes(searchTerm) || 
      (p.username || '').includes(searchTerm) || 
      (p.userId || '').includes(searchTerm)
    );
    
    if (filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:50px"><i class="fas fa-feather" style="font-size:45px;opacity:0.3"></i><p style="margin-top:15px;color:#64748b;">لا توجد منشورات</p></div>`;
      return;
    }

    const now = Date.now();
    const { topPromoted, topOrganic } = calculateTrendingPosts();
    
    const topPostIds = new Set([...topPromoted.map(p => p.id), ...topOrganic.map(p => p.id)]);
    
    const sorted = [...filtered].sort((a, b) => {
      if (topPostIds.has(a.id) && !topPostIds.has(b.id)) return -1;
      if (!topPostIds.has(a.id) && topPostIds.has(b.id)) return 1;
      
      const aPromo = (a.promotedUntil || 0) > now ? 1 : 0;
      const bPromo = (b.promotedUntil || 0) > now ? 1 : 0;
      if (aPromo !== bPromo) return bPromo - aPromo;
      
      const aFollowed = isFollowing(a.userId) ? 1 : 0;
      const bFollowed = isFollowing(b.userId) ? 1 : 0;
      if (aFollowed !== bFollowed) return bFollowed - aFollowed;
      
      return (b.timestamp || 0) - (a.timestamp || 0);
    });

    container.innerHTML = sorted.map((post, index) => {
      const isLiked = (post.likedBy || []).includes(currentUser?.uid);
      const isPromoted = (post.promotedUntil || 0) > now;
      const isOwner = post.userId === currentUserData?.userId;
      const followed = isFollowing(post.userId);
      const idClass = getIdClass(post.userId);
      const isVerified = post.verified || false;
      
      let trendBadge = '';
      let trendStyle = '';
      const promoIndex = topPromoted.findIndex(p => p.id === post.id);
      const organicIndex = topOrganic.findIndex(p => p.id === post.id);
      
      if (promoIndex !== -1) {
          const colors = ['#dc2626', '#10b981', '#3b82f6'];
          trendBadge = `<span class="trend-badge" style="background:${colors[promoIndex]};">🔥 ترند #${promoIndex+1}</span>`;
          trendStyle = `border: 4px solid ${colors[promoIndex]}; box-shadow: 0 0 20px ${colors[promoIndex]};`;
      } else if (organicIndex !== -1) {
          const colors = ['#dc2626', '#10b981', '#3b82f6'];
          trendBadge = `<span class="trend-badge" style="background:${colors[organicIndex]};">✨ الأفضل #${organicIndex+1}</span>`;

  const shareData = {
    title: 'وات تودي',
    text: shareText
  };
  
  if (post.mediaUrl && post.mediaType === 'image') {
    try {
      const response = await fetch(post.mediaUrl);
      const blob = await response.blob();
      const file = new File([blob], 'post-image.jpg', { type: blob.type });
      shareData.files = [file];
    } catch (e) {
      console.log('تعذر تحميل الصورة');

  if (navigator.share) {

  window.acceptReport = async function(reportId, postId) {
  const reportRef = doc(db, "reports", reportId);
  const reportDoc = await getDoc(reportRef);
  const reportData = reportDoc.data();
  
  const newCount = (reportData.acceptedCount || 0) + 1;
  
  if (newCount >= 3) {
    try {
      await deleteDoc(doc(db, "posts", postId));
    } catch (e) {
      console.log('المنشور محذوف مسبقاً');
    }
    
    await updateDoc(reportRef, { 
      status: 'deleted', 
      acceptedCount: newCount 
    });
    
    showToast('✅ تم حذف المنشور لتجاوز ٣ بلاغات مقبولة');
  } else {
    await updateDoc(reportRef, { 
      acceptedCount: newCount 
    });
    
    showToast(`✅ تم قبول البلاغ (${newCount}/3)`);
  }
  
  closeModal('reportsModal');
};

  window.rejectReport = async function(reportId) {
  await updateDoc(doc(db, "reports", reportId), { status: 'rejected' });
  showToast('❌ تم رفض البلاغ');
  closeModal('reportsModal');
};

  window.reportPost = function(postId) {
  const post = posts.find(p => p.id === postId);
  if (!post) {
    showToast('المنشور غير موجود', false);
    return;
  }
  
  const popup = document.querySelector('.post-menu-popup');
  if (popup) popup.remove();
  
  showBeautifulPrompt(
    '🚨 إبلاغ عن منشور',
    'اكتب سبب البلاغ',
    'محتوى غير لائق',
    async (reason) => {
      if (!reason || reason.trim() === '') return;
      
      try {
        const reportsRef = collection(db, "reports");
        const q = query(reportsRef, where("postId", "==", postId), where("status", "==", "pending"));
        const reportsSnapshot = await getDocs(q);
        
        let reportId;
        let reportCount = 1;
        
        if (!reportsSnapshot.empty) {
          const existingReport = reportsSnapshot.docs[0];
          reportId = existingReport.id;
          const data = existingReport.data();
          reportCount = (data.reportCount || 0) + 1;
          
          const reporters = data.reporters || [];
          reporters.push({
            reporterId: currentUserData?.userId || currentUser?.uid || 'unknown',
            reporterName: currentUserData?.username || 'مستخدم',
            reason: reason,
            timestamp: Date.now()
          });
          
          await updateDoc(doc(db, "reports", reportId), {
            reportCount: reportCount,
            reporters: reporters,
            reason: reason
          });
        } else {
          const newReport = {
            postId: postId,
            postContent: post.content || '',
            postOwnerId: post.userId || 'unknown',
            postOwnerName: post.username || 'مستخدم',
            postOwnerAvatar: post.emoji || '👤',
            status: 'pending',
            reportCount: 1,
            acceptedCount: 0,
            reason: reason,
            reporterId: currentUserData?.userId || currentUser?.uid || 'unknown',
            reporterName: currentUserData?.username || 'مستخدم',
            reporterAvatar: currentUserData?.emoji || '👤',
            timestamp: Date.now(),
            reporters: [{
              reporterId: currentUserData?.userId || currentUser?.uid || 'unknown',
              reporterName: currentUserData?.username || 'مستخدم',
              reason: reason,
              timestamp: Date.now()
            }]
          };
          
          const docRef = await addDoc(collection(db, "reports"), newReport);
          reportId = docRef.id;
        }
        
        showToast(`📢 تم إرسال البلاغ بنجاح (${reportCount} بلاغات)`);
        
      } catch (error) {
        console.error('خطأ في إرسال البلاغ:', error);
        showToast('❌ فشل إرسال البلاغ، حاول مرة أخرى', false);
      }
    }
  );
};

  window.toggleLike = async function(postId) {
    if (!currentUser) return;
    const postRef = doc(db, "posts", postId);
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    
    const liked = post.likedBy || [];
    const isLiked = liked.includes(currentUser.uid);
    
    if (isLiked) {
        await updateDoc(postRef, { likedBy: arrayRemove(currentUser.uid), likes: increment(-1) });
    } else {
        await updateDoc(postRef, { likedBy: arrayUnion(currentUser.uid), likes: increment(1) });
        
        const newLikes = (post.likes || 0) + 1;
        
        if (newLikes > 0 && newLikes % 3 === 0) {
            const ownerUserId = post.userId;
            
            try {
                const usersByIdQuery = query(collection(db, "users_by_id"), where("__name__", "==", ownerUserId));
                const usersByIdSnapshot = await getDocs(usersByIdQuery);
                
                let ownerUid = null;
                
                if (!usersByIdSnapshot.empty) {
                    ownerUid = usersByIdSnapshot.docs[0].data().uid;
                } else {
                    const usersQuery = query(collection(db, "users"), where("userId", "==", ownerUserId));
                    const usersSnapshot = await getDocs(usersQuery);
                    
                    if (!usersSnapshot.empty) {
                        ownerUid = usersSnapshot.docs[0].id;
                    }
                }
                
                if (!ownerUid && ownerUserId === currentUserData?.userId) {
                    ownerUid = currentUser.uid;
                }
                
                if (ownerUid) {
                    const ownerResourcesRef = doc(db, "resources", ownerUid);
                    const ownerResourcesDoc = await getDoc(ownerResourcesRef);
                    
                    if (ownerResourcesDoc.exists()) {
                        const currentGold = ownerResourcesDoc.data().gold || 0;
                        await updateDoc(ownerResourcesRef, { gold: currentGold + 1 });
                    } else {
                        await setDoc(ownerResourcesRef, { gold: 1, elixir: 10, money: 1000, oil: 100 });
                    }
                    
                    if (ownerUid === currentUser.uid) {
                        resources.gold = (resources.gold || 0) + 1;
                        updateResourcesUI();
                    }
                    
                    showToast(`🎉 ${post.username || 'صاحب المنشور'} ربح عملة ذهبية! (${newLikes} لايكات)`);
                    
                    playNotificationSound();
                } else {
                    console.log('❌ لم يتم العثور على معرف صاحب المنشور:', ownerUserId);
                }
                
            } catch (error) {
                console.error('❌ خطأ في إضافة الذهب:', error);
            }
        }
    }
};

  window.submitComment = async function() {
     
    if (window.ADMIN_allow_comments === false) {
        showToast('🚫 التعليقات معلقة حالياً', false);
        return;
    } 
    const inp = document.getElementById('newCommentInput');
    if (!inp) return;
    const text = inp.value.trim();
    if (!text || !activePostId || !currentUser) return;
    
    const comment = {
      id: 'c' + Date.now() + Math.random().toString(36),
      userId: currentUserData?.userId || currentUser.uid.slice(0, 6),
      username: currentUserData?.username || 'مستخدم',
      emoji: currentUserData?.emoji || '😎',
      avatarType: currentUserData?.avatarType || 'emoji',
      avatarUrl: currentUserData?.avatarUrl || '',
      colors: currentUserData?.colors || {},
      verified: currentUserData?.verified || false,
      text: text,
      timestamp: Date.now()
    };
    
    await updateDoc(doc(db, "posts", activePostId), {
      comments: arrayUnion(comment)
    });
    
    inp.value = '';
    closeModal('commentsModal');

  window.deleteComment = async function(postId, commentId) {
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    const comment = post.comments?.find(c => c.id === commentId);
    if (comment) {
      await updateDoc(doc(db, "posts", postId), {
        comments: arrayRemove(comment)
      });
      showToast('تم حذف التعليق');
    }
  };

  window.promotePost = async function(postId) {
    const post = posts.find(p => p.id === postId);
    if (!post || post.userId !== currentUserData?.userId) return;
    
    showBeautifulPrompt(
        '📈 ترويج المنشور',
        `أدخل عدد الأيام (1 إكسير لليوم)\nالإكسير المتوفر: ${resources.elixir || 0}`,
        '1',
        async (days) => {
            const daysNum = parseInt(days);
            if (!daysNum || daysNum < 1) {
                showToast('❌ الرجاء إدخال رقم صحيح', false);
                return;
            }
            
            if ((resources.elixir || 0) < daysNum) {
                showToast('❌ إكسير غير كافٍ', false);
                return;
            }
            
            resources.elixir -= daysNum;
            await setDoc(doc(db, "resources", currentUser.uid), resources);
            
            await updateDoc(doc(db, "posts", postId), {
                promotedUntil: Date.now() + daysNum * 86400000
            });
            
            updateResourcesUI();
            showToast(`✨ تم ترويج المنشور لمدة ${daysNum} يوم`);
        }
    );

  window.editPost = async function(postId) {

    showBeautifulPrompt(

        'قم بتعديل محتوى المنشور',
        post.content,
        async (newContent) => {

  window.publishPost = async function() {
    
    if (window.ADMIN_allow_posting === false) {
        showToast('🚫 النشر معلق حالياً من قبل الإدارة', false);
        return;
    }
    
   
    const content = document.getElementById('postText')?.value.trim();
    const mediaUrl = document.getElementById('postMediaUrl')?.value.trim();
    
    if (currentPublishType === 'blog') {
        if (!content) {
            showToast('الرجاء كتابة نص المدونة', false);
            return;
        }
    } else if (currentPublishType === 'reels') {
        if (!mediaUrl) {
            showToast('الرجاء إضافة رابط الصورة أو اليوتيوب للريلز', false);
            return;
        }
    }
    
    if (!currentUser) return;
    
    if (content.length > 500) {
        showToast('الحد الأقصى 500 حرف', false);
        return;
    }
    
    const promoDays = parseInt(document.getElementById('promoDays')?.value || '0');
    if (promoDays > 0 && (resources.elixir || 0) < promoDays) { 
        showToast('إكسير غير كافٍ', false); 
        return; 
    }
    
    if (promoDays > 0) {
        resources.elixir -= promoDays;
        await setDoc(doc(db, "resources", currentUser.uid), resources);
    }
    
    let mediaType = null;
    let finalMediaUrl = mediaUrl;
    
    if (currentPublishType === 'reels' && mediaUrl) {
        if (mediaUrl.includes('youtube.com') || mediaUrl.includes('youtu.be')) {
            mediaType = 'youtube';
            const videoId = mediaUrl.split('v=')[1]?.split('&')[0] || mediaUrl.split('/').pop();
            finalMediaUrl = `https://www.youtube.com/embed/${videoId}`;
        } else {
            mediaType = 'image';
        }
    }
    
    const newPost = {
        userId: currentUserData?.userId || currentUser.uid.slice(0, 6),
        username: currentUserData?.username || 'مستخدم',
        emoji: currentUserData?.emoji || '😎',
        avatarType: currentUserData?.avatarType || 'emoji',
        avatarUrl: currentUserData?.avatarUrl || '',
        colors: currentUserData?.colors || { frame: '#fbbf24', name: '#0f172a', id: '#8b5cf6', postText: '#334155', commentText: '#475569' },
        verified: currentUserData?.verified || false,
        content: content,
        mediaUrl: finalMediaUrl,
        mediaType: mediaType,
        postType: currentPublishType,
        timestamp: Date.now(),
        likes: 0,
        likedBy: [],
        comments: [],
        views: 0,
        shares: 0,
        reports: [],
        promotedUntil: promoDays > 0 ? Date.now() + promoDays * 86400000 : 0
    };
    
    await addDoc(collection(db, "posts"), newPost);
    
    updateResourcesUI();
    closeModal('publishModal');
    
    document.getElementById('postText').value = '';
    document.getElementById('postMediaUrl').value = '';
    document.getElementById('mediaPreview').style.display = 'none';
    
    showToast('✨ تم نشر منشورك بنجاح');
};

      return;

    if (!followers[currentUser.uid]) followers[currentUser.uid] = [];

      followers[currentUser.uid].push(activeProfileUserId); 
      showToast('✓ تمت المتابعة'); 
    } else { 
      followers[currentUser.uid].splice(idx, 1); 
      showToast('تم إلغاء المتابعة');

    renderPosts();
    if (activeProfileUserId) window.openProfile(activeProfileUserId);

  window.showFollowersList = async function(type) {
    currentFollowersListType = type;
    const title = type === 'followers' ? 'المتابعين' : 'أتابعهم';
    document.getElementById('followersListTitle').innerHTML = `<i class="fas fa-users"></i> ${title}`;
    
    let userIds = [];
    
    if (type === 'followers') {
      Object.entries(followers).forEach(([followerUid, followingList]) => {
        if (followingList?.includes(activeProfileUserId)) {
          userIds.push(followerUid);
        }
      });
    } else {
      userIds = followers[activeProfileUserId] || [];
    }
    
    const container = document.getElementById('followersListContainer');
    
    if (userIds.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:30px;">لا يوجد</p>';
      openModal('followersListModal');
      return;
    }
    
    const usersData = [];
    for (const uid of userIds) {
      const userDoc = await getDoc(doc(db, "users", uid));
      if (userDoc.exists()) {
        usersData.push({ uid, ...userDoc.data() });
      } else {
        const userPost = posts.find(p => p.userId === uid);
        if (userPost) {
          usersData.push({ uid, ...userPost });
        }
      }
    }
    
    const isOwnProfile = activeProfileUserId === currentUserData?.userId;
    
    container.innerHTML = usersData.map(user => {
      const idClass = getIdClass(user.userId || user.uid);
      const isVerified = user.verified || false;
      return `
      <div class="follower-item">
        <div class="follower-info" onclick="window.openProfile('${user.userId || user.uid}')">
          <div class="follower-avatar" style="border-color: ${user.colors?.frame || '#fbbf24'};">
            ${user.avatarType === 'image' && user.avatarUrl ? `<img src="${user.avatarUrl}">` : (user.emoji || '👤')}
          </div>
          <div>
            <div style="font-weight: 700; color: ${user.colors?.name || '#0f172a'};">
              ${user.username || 'مستخدم'}
              ${isVerified ? '<i class="fas fa-check-circle" style="color:#3b82f6; margin-right:3px; font-size:12px;"></i>' : ''}

            <span class="user-id-badge ${idClass}" style="background: ${user.colors?.frame || '#fbbf24'}; font-size: 10px;">#${user.userId || user.uid}</span>

          <button class="remove-follow-btn" onclick="window.removeFollower('${user.uid}')">

  window.invitePartner = async function() {
    showBeautifulPrompt(
        '💑 دعوة للارتباط',
        'أدخل معرف الشخص الذي تريد الارتباط به',
        '',
        async (partnerId) => {
            if (!partnerId) return;
            
            const usersQuery = query(collection(db, "users"), where("userId", "==", partnerId));
            const usersSnapshot = await getDocs(usersQuery);
            
            if (usersSnapshot.empty) {
                showToast('❌ لم يتم العثور على المستخدم', false);
                return;
            }
            
            const targetUser = usersSnapshot.docs[0];
            const targetUid = targetUser.id;
            
            const notifRef = doc(db, "notifications", targetUid);
            const notifDoc = await getDoc(notifRef);
            
            const request = {

            let requests = [];

  window.changePassword = async function() {
    const currentPass = document.getElementById('currentPassword')?.value;
    const newPass = document.getElementById('newPassword')?.value;
    const confirmPass = document.getElementById('confirmPassword')?.value;
    
    if (!currentPass || !newPass || !confirmPass) {
      showToast('جميع الحقول مطلوبة', false);
      return;
    }
    
    if (newPass !== confirmPass) {
      showToast('كلمة المرور الجديدة غير متطابقة', false);
      return;
    }
    
    if (newPass.length < 6) {
      showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', false);
      return;
    }
    
    try {
      const credential = EmailAuthProvider.credential(currentUser.email, currentPass);
      await reauthenticateWithCredential(currentUser, credential);
      await updatePassword(currentUser, newPass);
      showToast('✅ تم تغيير كلمة المرور بنجاح');
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';

                color: #0f172a;
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
            ">تأكيد</button>
            <button id="promptCancelBtn" style="
                flex: 1;
                padding: 14px;
                background: #f1f5f9;
                border: none;
                border-radius: 40px;
                color: #64748b;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
            ">إلغاء</button>
        </div>
    `;
    
    document.body.appendChild(overlay);
    document.body.appendChild(promptBox);
    
    const input = document.getElementById('beautifulPromptInput');
    input.focus();
    input.select();
    
    const closePrompt = (value) => {
        promptBox.style.animation = 'popOut 0.2s ease forwards';
        overlay.style.opacity = '0';
        setTimeout(() => {
            promptBox.remove();
            overlay.remove();
            if (callback) callback(value);
        }, 200);
    };
    
    document.getElementById('promptConfirmBtn').onclick = () => closePrompt(input.value);
    document.getElementById('promptCancelBtn').onclick = () => closePrompt(null);
    
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            closePrompt(input.value);
        }
    });
    
    const fadeStyle = document.createElement('style');
    fadeStyle.textContent = `
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    `;
    document.head.appendChild(fadeStyle);
  }

  function showConfirmDialog(title, message, confirmText, cancelText, callback) {
    const existingBox = document.getElementById('beautifulPromptBox');
    if (existingBox) existingBox.remove();
    
    const promptBox = document.createElement('div');
    promptBox.id = 'beautifulPromptBox';
    promptBox.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 350px;
        background: linear-gradient(145deg, #ffffff, #fafcff);
        border-radius: 30px;
        padding: 25px 20px;
        box-shadow: 0 30px 50px rgba(0,0,0,0.2), 0 0 0 3px #fbbf24;
        z-index: 10000;
        direction: rtl;
        animation: popIn 0.3s ease;
        text-align: center;
    `;
    
    const overlay = document.createElement('div');
    overlay.style.cssText = `
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        z-index: 9999;
    `;
    overlay.onclick = () => closeDialog(false);
    
    promptBox.innerHTML = `
        <div style="margin-bottom: 15px;">
            <i class="fas fa-trash" style="font-size: 45px; color: #ef4444; background: #fee2e2; padding: 12px; border-radius: 50%;"></i>
        </div>
        <h3 style="margin: 0 0 10px 0; color: #0f172a; font-weight: 800;">${title}</h3>
        <p style="margin: 0 0 25px 0; color: #64748b; font-size: 14px;">${message}</p>
        <div style="display: flex; gap: 10px;">
            <button id="confirmYes" style="
                flex: 1;
                padding: 14px;
                background: #ef4444;
                border: none;
                border-radius: 40px;
                color: white;
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
            ">${confirmText}</button>
            <button id="confirmNo" style="
                flex: 1;
                padding: 14px;
                background: #f1f5f9;
                border: none;
                border-radius: 40px;
                color: #64748b;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
            ">${cancelText}</button>
        </div>
    `;
    
    const closeDialog = (result) => {
        promptBox.style.animation = 'popOut 0.2s ease forwards';
        overlay.style.opacity = '0';
        setTimeout(() => {
            promptBox.remove();
            overlay.remove();
            if (callback) callback(result);
        }, 200);
    };
    
    document.body.appendChild(overlay);
    document.body.appendChild(promptBox);
    
    document.getElementById('confirmYes').onclick = () => closeDialog(true);
    document.getElementById('confirmNo').onclick = () => closeDialog(false);
  }

  // ========== نظام الوضع المظلم المتكامل ==========
  function applyThemeGlobally(isDark) {
    const body = document.body;
    
    if (isDark) {
        body.classList.add('dark-mode');
    } else {
        body.classList.remove('dark-mode');
    }
    
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  function toggleTheme() {
    const isDark = !document.body.classList.contains('dark-mode');
    const icon = document.getElementById('themeIcon');
    
    applyThemeGlobally(isDark);
    
    if (isDark) {
        icon.className = 'fas fa-sun';
        showToast('🌙 تم تفعيل الوضع المظلم');
    } else {
        icon.className = 'fas fa-moon';
        showToast('☀️ تم تفعيل الوضع المضيء');
    }
  }

  function loadTheme() {
    const savedTheme = localStorage.getItem('theme');
    const icon = document.getElementById('themeIcon');
    
    if (savedTheme === 'dark') {
        applyThemeGlobally(true);
        if (icon) icon.className = 'fas fa-sun';
    } else {
        if (icon) icon.className = 'fas fa-moon';
    }
  }

  // ========== نظام حفظ حالة الصفحة ==========
  function savePageState() {
    const state = {
        scrollY: window.scrollY,
        searchTerm: document.getElementById('searchInput')?.value || '',
        activeModal: document.querySelector('.modal-overlay.active')?.id || null,
        timestamp: Date.now()
    };
    sessionStorage.setItem('pageState', JSON.stringify(state));
  }

  function restorePageState() {
    if (performance.navigation && performance.navigation.type === 1) {
        return;
    }

    const savedState = sessionStorage.getItem('pageState');
    if (savedState) {
        try {
            const state = JSON.parse(savedState);
            
            const searchInput = document.getElementById('searchInput');
            if (searchInput && state.searchTerm) {
                searchInput.value = state.searchTerm;
                searchInput.dispatchEvent(new Event('input', { bubbles: true }));
            }

            if (state.scrollY) {
                setTimeout(() => {
                    window.scrollTo(0, state.scrollY);
                }, 500);
            }
        } catch (e) {
            console.log('تعذر استعادة حالة الصفحة');
        }
    }
  }

  window.addEventListener('beforeunload', savePageState);
  window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
        
        if (typeof subscribeToPosts === 'function') {
            subscribeToPosts();
        }
        if (typeof subscribeToStories === 'function') {
            subscribeToStories();
        }
        if (typeof subscribeToUnreadMessages === 'function') {
            subscribeToUnreadMessages();
        }
    }
  });

  const modalObserver = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
        savePageState();
      }
    });
  });

  document.querySelectorAll('.modal-overlay').forEach(modal => {
    modalObserver.observe(modal, { attributes: true, attributeFilter: ['class'] });
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
      
      await loadAdminSettings();
        
      if (!currentUserData?.userId) {
        const userId = user.uid.slice(0, 6);
        currentUserData = { ...currentUserData, userId: userId };
        await setDoc(doc(db, "users", user.uid), currentUserData, { merge: true });
        await setDoc(doc(db, "users_by_id", userId), { uid: user.uid });
      }
      
      subscribeToPosts();
      subscribeToStories();
      subscribeToUnreadMessages();
      
      const messagesQuery = query(collection(db, "chats"));
      onSnapshot(messagesQuery, (snapshot) => {
        let hasNewMessage = false;
        snapshot.docChanges().forEach(change => {
          if (change.type === 'modified') {
            const data = change.doc.data();
            const unread = data.unreadCount?.[currentUser.uid] || 0;
            if (unread > 0) {
              hasNewMessage = true;
            }
          }
        });
        if (hasNewMessage) {
          playNotificationSound();
        }
      });
      
      restorePageState();
    } else {
      const container = document.getElementById('postsContainer');
      if (container) {
        container.innerHTML = `
          <div style="text-align:center;padding:50px;">
            <i class="fas fa-sign-in-alt" style="font-size:50px;opacity:0.5;margin-bottom:20px;"></i>
            <h3 style="color:#0f172a;margin-bottom:10px;">يرجى تسجيل الدخول</h3>
            <p style="color:#64748b;margin-bottom:20px;">يجب عليك تسجيل الدخول للوصول إلى المنصة</p>
            <button onclick="window.location.reload()" style="background:#fbbf24;border:none;padding:12px 30px;border-radius:30px;font-weight:700;cursor:pointer;">
              <i class="fas fa-sync-alt"></i> تحديث الصفحة
            </button>
          </div>
        `;
      }
    }
  });

  window.addEventListener('load', () => {
    loadTheme();
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderPosts();
        savePageState();
      });
    }

    document.getElementById('accountBtn')?.addEventListener('click', () => {
      if (currentUserData) {
        window.openProfile(currentUserData.userId);
      } else {
        openAccountModal();
      }
    });
    
    document.getElementById('mainPublishBtn')?.addEventListener('click', () => openModal('publishModal'));
    
    const postText = document.getElementById('postText');
    if (postText) {
      postText.addEventListener('input', function() {
        document.getElementById('charCounter').innerText = this.value.length + '/500';
      });
    }

    document.querySelectorAll('.close-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        this.closest('.modal-overlay')?.classList.remove('active');
        savePageState();
      });
    });

    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', function(e) {
        if (e.target === this) {
          this.classList.remove('active');
          savePageState();
        }
      });
    });
  });

  window.showToast = showToast;
  window.closeModal = closeModal;
  window.openModal = openModal;
  window.toggleTheme = toggleTheme;
  window.loadTheme = loadTheme;
</script>
    

</body>
</html>
