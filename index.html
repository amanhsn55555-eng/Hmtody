<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>غرف الدردشة • منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tajawal', sans-serif;
    }

    /* تأثيرات نارية وثلجية */
    @keyframes fireGreen {
      0% { text-shadow: 0 0 5px #22c55e, 0 0 10px #16a34a, 0 0 15px #15803d; }
      25% { text-shadow: 0 0 10px #4ade80, 0 0 20px #22c55e, 0 0 30px #16a34a; }
      50% { text-shadow: 0 0 15px #4ade80, 0 0 25px #22c55e, 0 0 35px #16a34a; }
      75% { text-shadow: 0 0 10px #4ade80, 0 0 20px #22c55e, 0 0 30px #16a34a; }
      100% { text-shadow: 0 0 5px #22c55e, 0 0 10px #16a34a, 0 0 15px #15803d; }
    }
    
    @keyframes fireRed {
      0% { text-shadow: 0 0 5px #ef4444, 0 0 10px #dc2626, 0 0 15px #b91c1c; }
      25% { text-shadow: 0 0 10px #f87171, 0 0 20px #ef4444, 0 0 30px #dc2626; }
      50% { text-shadow: 0 0 15px #f87171, 0 0 25px #ef4444, 0 0 35px #dc2626; }
      75% { text-shadow: 0 0 10px #f87171, 0 0 20px #ef4444, 0 0 30px #dc2626; }
      100% { text-shadow: 0 0 5px #ef4444, 0 0 10px #dc2626, 0 0 15px #b91c1c; }
    }
    
    @keyframes ice {
      0% { text-shadow: 0 0 5px #bae6fd, 0 0 10px #7dd3fc, 0 0 15px #38bdf8; }
      25% { text-shadow: 0 0 8px #e0f2fe, 0 0 15px #bae6fd, 0 0 20px #7dd3fc; }
      50% { text-shadow: 0 0 15px #e0f2fe, 0 0 25px #bae6fd, 0 0 35px #7dd3fc; }
      75% { text-shadow: 0 0 8px #e0f2fe, 0 0 15px #bae6fd, 0 0 20px #7dd3fc; }
      100% { text-shadow: 0 0 5px #bae6fd, 0 0 10px #7dd3fc, 0 0 15px #38bdf8; }
    }

    .owner-name-effect { 
      animation: fireGreen 1.5s infinite; 
      font-weight: 800; 
      display: inline-block;
    }
    
    .moderator-name-effect { 
      animation: fireRed 1.5s infinite; 
      font-weight: 800; 
      display: inline-block;
    }
    
    .member-name-effect { 
      animation: ice 2s infinite; 
      display: inline-block;
    }

    /* تأثير خلفية الرسائل */
    .message-text.owner-message {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(22, 163, 74, 0.1));
      border: 1px solid rgba(74, 222, 128, 0.2);
    }
    
    .message-text.moderator-message {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(220, 38, 38, 0.1));
      border: 1px solid rgba(248, 113, 113, 0.2);
    }
    
    .message-text.member-message {
      background: linear-gradient(135deg, rgba(186, 230, 253, 0.1), rgba(125, 211, 252, 0.05));
      border: 1px solid rgba(186, 230, 253, 0.15);
    }

    /* تأثير خلفية اسم المرسل */
    .message-sender.owner-sender {
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(34, 197, 94, 0.1));
      padding: 2px 8px;
      border-radius: 20px;
      border-right: 3px solid #4ade80;
    }
    
    .message-sender.moderator-sender {
      background: linear-gradient(135deg, rgba(248, 113, 113, 0.2), rgba(239, 68, 68, 0.1));
      padding: 2px 8px;
      border-radius: 20px;
      border-right: 3px solid #f87171;
    }
    
    .message-sender.member-sender {
      background: linear-gradient(135deg, rgba(186, 230, 253, 0.15), rgba(125, 211, 252, 0.08));
      padding: 2px 8px;
      border-radius: 20px;
      border-right: 3px solid #bae6fd;
    }

    body {
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #f8fafc;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
      -webkit-tap-highlight-color: transparent;
    }

    /* ========== هيدر الغرف ========== */
    .rooms-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rooms-header h2 {
      font-size: 20px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rooms-header h2 i {
      color: #8b5cf6;
    }

    .back-btn {
      cursor: pointer;
      color: #94a3b8;
      font-size: 20px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: #8b5cf6;
    }

    /* ========== مربع البحث ========== */
    .search-section {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      z-index: 998;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 10px;
    }

    .search-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 30px;
      padding: 5px 15px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .search-wrapper i {
      color: #8b5cf6;
      margin-left: 10px;
    }

    .search-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 0;
      color: white;
      font-size: 14px;
      outline: none;
    }

    .create-room-btn {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border: none;
      color: white;
      padding: 0 18px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    /* ========== قائمة الغرف ========== */
    .rooms-container {
      margin-top: 120px;
      padding: 12px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 30px;
    }

    .rooms-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .room-card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 20px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .room-card.advanced {
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .room-card.advanced::before {
      content: '✨';
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 14px;
      z-index: 1;
    }

    .room-image {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #2d3748, #1a202c);
    }

    .room-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .room-name {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .room-desc {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .room-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .room-members {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #8b5cf6;
    }

    .room-type-badge {
      background: rgba(139, 92, 246, 0.2);
      color: #8b5cf6;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 600;
    }

    /* ========== غرفة الدردشة ========== */
    .chat-room-view {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2000;
      display: none;
      flex-direction: column;
      background: #0f172a;
    }

    .chat-room-view.active {
      display: flex;
    }

    .room-background {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.25;
      z-index: 0;
    }

    .room-background::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.6) 0%, rgba(15, 23, 42, 0.85) 100%);
    }

    .room-header {
      position: relative;
      z-index: 2;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(15px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .room-info {
      flex: 1;
    }

    .room-title {
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .room-subtitle {
      font-size: 11px;
      color: #94a3b8;
    }

    .room-actions {
      display: flex;
      gap: 15px;
    }

    .room-actions i {
      font-size: 18px;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* ========== بطاقة المالك ========== */
    .owner-card {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(245, 158, 11, 0.1));
      border-bottom: 1px solid rgba(251, 191, 36, 0.3);
      margin-bottom: 0;
    }

    .owner-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #fbbf24;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: rgba(255,255,255,0.1);
    }

    .owner-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .owner-info {
      flex: 1;
    }

    .owner-name {
      font-weight: 800;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .owner-name i {
      color: #fbbf24;
      font-size: 14px;
    }

    .owner-badge {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
    }

    .owner-since {
      font-size: 10px;
      color: #94a3b8;
    }

    /* ========== منطقة الرسائل ========== */
    .messages-area {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .message-item {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(255,255,255,0.1);
    }

    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .message-content {
      flex: 1;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .message-sender {
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .message-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 15px;
      font-weight: 600;
    }

    .message-badge.owner {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
    }

    .message-badge.moderator {
      background: #8b5cf6;
      color: white;
    }

    .message-time {
      font-size: 10px;
      color: #94a3b8;
    }

    .message-text {
      padding: 10px 14px;
      border-radius: 18px;
      border-top-right-radius: 5px;
      font-size: 14px;
      word-break: break-word;
      backdrop-filter: blur(5px);
      color: #f1f5f9;
    }

    .message-media {
      margin-top: 8px;
      max-width: 300px;
    }

    .message-media img {
      max-width: 100%;
      border-radius: 15px;
      cursor: pointer;
    }

    .message-media iframe {
      width: 100%;
      max-width: 300px;
      height: 169px;
      border-radius: 15px;
      border: none;
    }

    .message-actions {
      display: flex;
      gap: 10px;
      margin-top: 5px;
      opacity: 0;
      transition: all 0.2s;
    }

    .message-item:hover .message-actions {
      opacity: 1;
    }

    .message-actions i {
      font-size: 12px;
      color: #ef4444;
      cursor: pointer;
    }

    /* أيقونة الهدية */
    .gift-badge {
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
    }
    
    .gift-badge img {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid gold;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    /* ========== الأيقونات الخاصة ========== */
    .special-icons {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 12px 10px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .special-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255, 255, 255, 0.05);
      border: 3px solid;
      position: relative;
      overflow: hidden;
    }

    .special-icon:hover {
      transform: scale(1.08);
    }

    .special-icon.occupied {
      cursor: not-allowed;
    }

    .special-icon.occupied:hover {
      transform: scale(1);
    }

    .special-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .special-icon .icon-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .special-icon .timer-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: #fbbf24;
      color: #0f172a;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 5px;
      border-radius: 20px;
    }

    .special-icon .reward-badge {
      position: absolute;
      top: -2px;
      left: -2px;
      background: #10b981;
      color: white;
      font-size: 8px;
      padding: 2px 4px;
      border-radius: 20px;
    }

    .special-icon.lion { border-color: #fbbf24; }
    .special-icon.fish { border-color: #3b82f6; }
    .special-icon.crown { border-color: #fbbf24; }
    .special-icon.rainbow { border-color: #ec4899; }
    .special-icon.tree { border-color: #10b981; }
    .special-icon.dark { border-color: #94a3b8; }

    /* ========== قوائم الأعضاء والمحظورين ========== */
    .members-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 320px;
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(20px);
      z-index: 3000;
      transform: translateX(100%);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
    }

    .members-panel.active {
      transform: translateX(0);
    }

    .panel-header {
      padding: 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h4 {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .close-panel {
      cursor: pointer;
      color: #94a3b8;
      font-size: 18px;
    }

    .panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .panel-tabs {
      display: flex;
      padding: 10px;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      position: relative;
    }

    .panel-tab.active {
      background: #8b5cf6;
    }

    .banned-count {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 20px;
      min-width: 18px;
    }

    .member-item, .banned-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .member-item:hover, .banned-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .member-avatar, .banned-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: rgba(255,255,255,0.1);
    }

    .member-avatar img, .banned-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .member-info, .banned-info {
      flex: 1;
    }

    .member-name, .banned-name {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .member-role {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      display: inline-block;
    }

    .member-role.owner {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
    }

    .member-role.moderator {
      background: #8b5cf6;
      color: white;
    }

    .member-actions {
      display: flex;
      gap: 8px;
    }

    .member-actions i {
      font-size: 14px;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .member-actions i.fa-crown { color: #fbbf24; }
    .member-actions i.fa-ban { color: #ef4444; }

    .unban-btn {
      color: #10b981;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 15px;
      background: rgba(16, 185, 129, 0.1);
      font-size: 12px;
    }

    /* ========== الملف الشخصي المصغر ========== */
    .profile-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e293b;
      border-radius: 25px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      z-index: 5000;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .profile-popup.active {
      display: block;
    }

    .profile-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      z-index: 4900;
      display: none;
    }

    .profile-popup-overlay.active {
      display: block;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 15px;
      border: 4px solid;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      background: rgba(255,255,255,0.1);
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .profile-id {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 15px;
    }

    .profile-stats {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
    }

    .stat-label {
      font-size: 11px;

  function extractYoutubeId(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
  }

  function parseMessageText(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const urls = text.match(urlRegex) || [];
    
    let mediaHtml = '';
    let displayText = text;
    
    urls.forEach(url => {
      if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
        mediaHtml += `<div class="message-media"><img src="${url}" onclick="window.open('${url}')" onerror="this.style.display='none'"></div>`;
        displayText = displayText.replace(url, '');
      } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
        const videoId = extractYoutubeId(url);
        if (videoId) {
          mediaHtml += `<div class="message-media"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>`;
          displayText = displayText.replace(url, '');
        }
      }
    });
    
    return { displayText: displayText.trim(), mediaHtml };
  }

    try {
      const userDoc = await getDoc(doc(db, "users", uid));
      if (userDoc.exists()) currentUserData = userDoc.data();
      
      const resDoc = await getDoc(doc(db, "resources", uid));
      if (resDoc.exists()) resources = resDoc.data();
    } catch (e) {
      console.error("خطأ في تحميل بيانات المستخدم:", e);
    }
  }

  async function loadBannedUsersData(bannedUids) {
    bannedUsersData = [];
    for (const uid of bannedUids) {
      const userDoc = await getDoc(doc(db, "users", uid));
      if (userDoc.exists()) {
        bannedUsersData.push({ uid, ...userDoc.data() });
      } else {

    }
  }

  function subscribeToRooms() {
    const roomsQuery = query(collection(db, "rooms"), orderBy("createdAt", "desc"));
    onSnapshot(roomsQuery, (snapshot) => {
      rooms = [];
      snapshot.forEach(doc => rooms.push({ id: doc.id, ...doc.data() }));

  function renderRooms() {
    const container = document.getElementById('roomsContainer');
    let filtered = rooms.filter(r => 
      (r.name || '').includes(searchTerm) || (r.description || '').includes(searchTerm)

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><p>لا توجد غرف</p></div>`;
      return;
    }

    let html = '';
    for (let i = 0; i < filtered.length; i += 2) {
      html += '<div class="rooms-row">';
      html += renderRoomCard(filtered[i]);
      if (filtered[i + 1]) html += renderRoomCard(filtered[i + 1]);

  window.requestJoinRoom = (roomId) => {
    const room = rooms.find(r => r.id === roomId);
    if (!room) return;
    if ((room.members || []).length >= (room.capacity || 50)) { 
      showToast('الغرفة ممتلئة', false); 
      return; 
    }
    if ((room.bannedUsers || []).includes(currentUser.uid)) { 
      showToast('أنت محظور من هذه الغرفة', false); 
      return; 
    }
    
    if (room.password) {
      document.getElementById('targetRoomId').value = roomId;
      document.getElementById('passwordModal')?.classList.add('active');
    } else {
      joinRoom(roomId);
    }
  };

    const roomId = document.getElementById('targetRoomId')?.value;
    const password = document.getElementById('roomPasswordInput')?.value;
    const room = rooms.find(r => r.id === roomId);
    if (room?.password === password) { 
      closePasswordModal(); 
      joinRoom(roomId); 
    } else {
      showToast('الرمز السري غير صحيح', false);
    }

  async function joinRoom(roomId) {
    const room = rooms.find(r => r.id === roomId);
    if (!room) return;
    
    const existingMember = (room.members || []).find(m => m.uid === currentUser.uid);
    if (!existingMember) {
      await updateDoc(doc(db, "rooms", roomId), {
        members: arrayUnion({
          uid: currentUser.uid, 
          name: currentUserData?.username || 'مستخدم',
          avatar: currentUserData?.avatarUrl || '', 
          avatarType: currentUserData?.avatarType || 'emoji',
          emoji: currentUserData?.emoji || '👤', 
          colors: currentUserData?.colors || {},
          role: 'member', 
          joinedAt: Date.now()
        })
      });
    }
    openChatRoom(roomId);
  }

    document.querySelector('.rooms-container').style.display = 'none';
    
    currentRoomId = roomId;
    if (unsubscribeRoom) unsubscribeRoom();
    unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), async (docSnap) => {
      if (docSnap.exists()) {
        currentRoom = { id: roomId, ...docSnap.data() };
        await loadBannedUsersData(currentRoom.bannedUsers || []);
        monitorLogs = currentRoom.monitorLogs || [];
        updateRoomUI();
        renderSpecialIcons();
        renderPanelList();
        updateMembersCount();

  function renderSpecialIcons() {
    const container = document.getElementById('specialIcons');
    if (!container) return;
    
    const isAdvanced = currentRoom?.type === 'advanced';
    container.style.display = isAdvanced ? 'flex' : 'none';
    if (!isAdvanced) return;
    
    const occupants = currentRoom?.iconOccupants || {};
    
    container.innerHTML = iconTypes.map(type => {
      const occupant = occupants[type];
      const isOccupied = occupant && occupant.uid;
      const isMe = isOccupied && occupant.uid === currentUser.uid;
      const timeLeft = isMe ? Math.max(0, 3600 - Math.floor((Date.now() - occupant.joinedAt) / 1000)) : 0;
      const earned = isMe ? Math.floor((Date.now() - occupant.joinedAt) / 3600000) : 0;
      
      return `
        <div class="special-icon ${type} ${isOccupied ? 'occupied' : ''}" onclick="${isOccupied && !isMe ? '' : `handleIconClick('${type}')`}">
          ${isOccupied ? `
            ${occupant.avatar ? `<img src="${occupant.avatar}">` : `<div class="icon-content"><span>${occupant.emoji || '👤'}</span></div>`}
          ` : `<i class="fas fa-${getIconFA(type)}"></i>`}
          ${isMe ? `<span class="timer-badge">${formatTime(timeLeft)}</span><span class="reward-badge">+${earned}</span>` : ''}
        </div>
      `;
    }).join('');
  }

  function getIconFA(type) {
    const icons = { lion: 'paw', fish: 'fish', crown: 'crown', rainbow: 'rainbow', tree: 'tree', dark: 'moon' };
    return icons[type] || 'star';
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60), s = seconds % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  window.handleIconClick = async (iconType) => {
    if (!currentRoom || currentRoom.type !== 'advanced') return;
    const occupants = currentRoom.iconOccupants || {};
    const existing = occupants[iconType];
    
    if (existing) {
      showToast('هذه الأيقونة محجوزة حالياً', false);
      return;
    }
    
    for (const [type, occupant] of Object.entries(occupants)) {
      if (occupant?.uid === currentUser.uid) {
        const earned = Math.floor((Date.now() - occupant.joinedAt) / 3600000);
        if (earned > 0) {
          await updateDoc(doc(db, "resources", currentUser.uid), { gold: increment(earned) });
          resources.gold += earned;
          showToast(`ربحت ${earned} ذهب!`, true);
        }
        const newOccupants = { ...occupants };
        delete newOccupants[type];
        await updateDoc(doc(db, "rooms", currentRoomId), { iconOccupants: newOccupants });
        return;
      }
    }
    
    const newOccupants = { ...occupants };
    newOccupants[iconType] = {
      uid: currentUser.uid, 
      name: currentUserData?.username,
      avatar: currentUserData?.avatarType === 'image' ? currentUserData?.avatarUrl : null,
      emoji: currentUserData?.emoji, 
      joinedAt: Date.now()
    };
    await updateDoc(doc(db, "rooms", currentRoomId), { iconOccupants: newOccupants });
    showToast(`انضممت إلى أيقونة ${iconNames[iconType]}!`, true);
  };

  function subscribeToMessages(roomId) {
    if (unsubscribeMessages) unsubscribeMessages();
    const msgQuery = query(collection(db, "rooms", roomId, "messages"), orderBy("timestamp", "asc"));
    unsubscribeMessages = onSnapshot(msgQuery, (snapshot) => {
      const area = document.getElementById('messagesArea');
      if (snapshot.empty) {
        area.innerHTML = `<div class="empty-state"><i class="fas fa-comment-dots"></i><p>لا توجد رسائل بعد</p></div>`;
        return;
      }
      
      let html = '';
      const styles = currentRoom?.textStyles || {};
      
      snapshot.forEach(doc => {
        const msg = doc.data();
        const isOwner = currentRoom?.ownerId === currentUser.uid;
        const isModerator = (currentRoom?.moderators || []).includes(currentUser.uid);
        const canDelete = msg.uid === currentUser.uid || isOwner || (isModerator && msg.uid !== currentRoom?.ownerId);
        
        const parsed = parseMessageText(msg.text || '');
        const isMsgOwner = msg.uid === currentRoom?.ownerId;
        const isMsgModerator = (currentRoom?.moderators || []).includes(msg.uid);
        
        // تحديد التأثيرات حسب الرتبة
        let nameEffectClass = 'member-name-effect';
        let senderClass = 'member-sender';
        let messageClass = 'member-message';
        let nameColor = styles.memberColor || '#bae6fd';
        let nameSize = styles.memberSize || 14;
        
        if (isMsgOwner) {
          nameEffectClass = 'owner-name-effect';
          senderClass = 'owner-sender';
          messageClass = 'owner-message';
          nameColor = styles.ownerColor || '#4ade80';
          nameSize = styles.ownerSize || 16;
        } else if (isMsgModerator) {
          nameEffectClass = 'moderator-name-effect';
          senderClass = 'moderator-sender';
          messageClass = 'moderator-message';
          nameColor = styles.modColor || '#f87171';
          nameSize = styles.modSize || 15;
        }
        
        html += `
          <div class="message-item">
            <div class="message-avatar" style="border-color: ${msg.colors?.frame || '#8b5cf6'};" onclick="showMemberProfile('${msg.uid}')">
              ${msg.avatarType === 'image' && msg.avatar ? `<img src="${msg.avatar}">` : (msg.emoji || '👤')}
            </div>
            <div class="message-content">
              <div class="message-header">
                <span class="message-sender ${nameEffectClass} ${senderClass}" style="color: ${nameColor}; font-size: ${nameSize}px; font-family: ${styles.fontFamily};" onclick="showMemberProfile('${msg.uid}')">${msg.name || 'مستخدم'}</span>
                ${isMsgOwner ? '<span class="message-badge owner"><i class="fas fa-crown"></i> مالك</span>' : ''}
                ${isMsgModerator && !isMsgOwner ? '<span class="message-badge moderator"><i class="fas fa-shield-alt"></i> مشرف</span>' : ''}
                <span class="message-time">${msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' }) : ''}</span>
                ${msg.gift ? `<span class="gift-badge"><img src="${msg.gift.image}" title="${msg.gift.name}"></span>` : ''}
              </div>
              ${parsed.displayText ? `<div class="message-text ${messageClass}">${parsed.displayText}</div>` : ''}
              ${parsed.mediaHtml}
              ${canDelete ? `<div class="message-actions"><i class="fas fa-trash" onclick="deleteMessage('${doc.id}')"></i></div>` : ''}
            </div>
          </div>
        `;
      });
      area.innerHTML = html;
      area.scrollTop = area.scrollHeight;
    });
  }

  window.sendMessage = async () => {
    const input = document.getElementById('messageInput');
    if (!input || !currentRoomId) return;
    let text = input.value.trim();
    if (!text) return;
    
    // تطبيق الاختصارات
    const shortcuts = currentRoom?.shortcuts || {};
    for (const [key, value] of Object.entries(shortcuts)) {
      const regex = new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      text = text.replace(regex, value);
    }
    
    // فلتر الكلمات المحظورة
    const bannedWords = currentRoom?.bannedWords || [];
    const lowerText = text.toLowerCase();
    for (const word of bannedWords) {
      if (lowerText.includes(word.toLowerCase())) {
        showToast(`رسالتك تحتوي على كلمة محظورة: "${word}"`, false);
        return;
      }
    }
    
    // فلتر الكلمات المراقبة
    const monitoredWords = currentRoom?.monitoredWords || [];
    let hasMonitoredWord = false;
    let detectedWords = [];
    
    for (const word of monitoredWords) {
      if (lowerText.includes(word.toLowerCase())) {
        hasMonitoredWord = true;
        detectedWords.push(word);
      }
    }
    
    const member = (currentRoom?.members || []).find(m => m.uid === currentUser.uid);
    const isStaff = currentUser.uid === currentRoom?.ownerId || (currentRoom?.moderators || []).includes(currentUser.uid);
    
    // إذا كانت هناك كلمة مراقبة والمستخدم ليس من الطاقم
    if (hasMonitoredWord && !isStaff) {
      const logEntry = {
        userId: currentUser.uid,
        userName: currentUserData?.username || 'مستخدم',
        userAvatar: currentUserData?.avatarType === 'image' ? currentUserData?.avatarUrl : null,
        userEmoji: currentUserData?.emoji || '👤',
        message: text,
        detectedWords: detectedWords,
        timestamp: Date.now()
      };
      
      // إضافة السجل إلى قاعدة البيانات
      const updatedLogs = [...(currentRoom.monitorLogs || []), logEntry].slice(-50);
      await updateDoc(doc(db, "rooms", currentRoomId), { monitorLogs: updatedLogs });
      
      showToast(`رسالتك تحتوي على كلمة مراقبة وتم إعلام المشرفين`, false);
    }
    
    await addDoc(collection(db, "rooms", currentRoomId, "messages"), {
      uid: currentUser.uid, 
      name: currentUserData?.username || 'مستخدم',
      avatar: currentUserData?.avatarUrl || '', 
      avatarType: currentUserData?.avatarType || 'emoji',
      emoji: currentUserData?.emoji || '👤', 
      colors: currentUserData?.colors || {},
      role: member?.role || 'member', 
      text, 
      timestamp: Date.now()
    });
    
    input.value = '';
  };

    if (e.key === 'Enter') sendMessage(); 
  };

    list.innerHTML = members.map(m => {
      const canPromote = isOwner && m.role === 'member' && (currentRoom.moderators || []).length < 3;
      const canDemote = isOwner && m.role === 'moderator';
      const canBan = (isOwner || isModerator) && m.uid !== currentUser.uid && m.role !== 'owner' && (!isModerator || m.role === 'member');
      
      let nameEffectClass = 'member-name-effect';
      let nameColor = styles.memberColor || '#bae6fd';
      let nameSize = styles.memberSize || 14;
      
      if (m.role === 'owner') {
        nameEffectClass = 'owner-name-effect';
        nameColor = styles.ownerColor || '#4ade80';
        nameSize = styles.ownerSize || 16;
      } else if (m.role === 'moderator') {

        nameSize = styles.modSize || 15;

      return `

          <div class="member-avatar" style="border-color: ${m.colors?.frame || '#8b5cf6'};">
            ${m.avatarType === 'image' && m.avatar ? `<img src="${m.avatar}">` : (m.emoji || '👤')}
          </div>
          <div class="member-info">
            <div class="member-name ${nameEffectClass}" style="color: ${nameColor}; font-size: ${nameSize}px; font-family: ${styles.fontFamily};">
              ${m.name || 'مستخدم'}
              ${m.role === 'owner' ? '<i class="fas fa-crown" style="color: #fbbf24;"></i>' : ''}
            </div>
            <span class="member-role ${m.role}">${m.role === 'owner' ? '👑 مالك' : (m.role === 'moderator' ? '🛡️ مشرف' : '👤 عضو')}</span>
          </div>
          <div class="member-actions" onclick="event.stopPropagation()">
            ${canPromote ? `<i class="fas fa-crown" onclick="promoteToModerator('${m.uid}')" title="ترقية لمشرف"></i>` : ''}
            ${canDemote ? `<i class="fas fa-level-down-alt" onclick="demoteFromModerator('${m.uid}')" title="إزالة من الإشراف" style="color: #fbbf24;"></i>` : ''}
            ${canBan ? `<i class="fas fa-ban" onclick="banMember('${m.uid}')" title="حظر"></i>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderBannedList() {
    const list = document.getElementById('membersList');

  window.promoteToModerator = async (uid) => {
    if (!currentRoom || currentRoom.ownerId !== currentUser.uid) return;
    if ((currentRoom.moderators || []).length >= 3) { 
      showToast('لا يمكن تعيين أكثر من 3 مشرفين', false); 
      return; 
    }
    
    const updatedMembers = currentRoom.members.map(m => m.uid === uid ? { ...m, role: 'moderator' } : m);
    await updateDoc(doc(db, "rooms", currentRoomId), {
      members: updatedMembers,
      moderators: arrayUnion(uid)
    });
    showToast('تمت الترقية إلى مشرف');
  };

  window.demoteFromModerator = async (uid) => {
    if (!currentRoom || currentRoom.ownerId !== currentUser.uid) return;
    
    const updatedMembers = currentRoom.members.map(m => m.uid === uid ? { ...m, role: 'member' } : m);
    await updateDoc(doc(db, "rooms", currentRoomId), {
      members: updatedMembers,
      moderators: arrayRemove(uid)
    });
    showToast('تمت إزالة المشرف');
  };

  window.banMember = async (uid) => {
    if (!currentRoom) return;
    const isOwner = currentRoom.ownerId === currentUser.uid;
    const isModerator = (currentRoom.moderators || []).includes(currentUser.uid);
    if (!isOwner && !isModerator) return;
    
    const targetMember = currentRoom.members.find(m => m.uid === uid);
    if (targetMember?.role === 'owner') { 
      showToast('لا يمكن حظر المالك', false); 
      return; 
    }
    if (isModerator && targetMember?.role === 'moderator') { 
      showToast('لا يمكن للمشرف حظر مشرف آخر', false); 
      return; 
    }
    
    const occupants = currentRoom.iconOccupants || {};
    let newOccupants = { ...occupants };
    let iconUpdated = false;
    for (const [type, occupant] of Object.entries(occupants)) {
      if (occupant?.uid === uid) {
        delete newOccupants[type];
        iconUpdated = true;
      }
    }
    
    const updateData = {
      bannedUsers: arrayUnion(uid),
      members: currentRoom.members.filter(m => m.uid !== uid)
    };
    if (iconUpdated) updateData.iconOccupants = newOccupants;
    
    await updateDoc(doc(db, "rooms", currentRoomId), updateData);
    showToast('تم حظر العضو');
  };

  window.unbanMember = async (uid) => {
    if (!currentRoom) return;
    const isOwner = currentRoom.ownerId === currentUser.uid;
    const isModerator = (currentRoom.moderators || []).includes(currentUser.uid);
    if (!isOwner && !isModerator) return;
    
    await updateDoc(doc(db, "rooms", currentRoomId), {
      bannedUsers: arrayRemove(uid)
    });
    showToast('تم إلغاء الحظر');

  window.sendGiftToMember = async (targetUid) => {
    const giftId = document.getElementById('selectedGiftId').value;
    const gift = currentRoom.gifts.find(g => g.id === giftId);
    
    if (!gift) {
      showToast('الهدية غير موجودة', false);
      return;
    }
    
    const targetMember = currentRoom.members.find(m => m.uid === targetUid);
    if (!targetMember) {
      showToast('العضو غير موجود', false);
      return;
    }
    
    if (resources.gold < gift.price) {
      showToast('رصيدك غير كافٍ لإرسال هذه الهدية', false);
      return;
    }
    
    // خصم الذهب من المرسل
    await updateDoc(doc(db, "resources", currentUser.uid), {
      gold: increment(-gift.price)
    });
    resources.gold -= gift.price;
    
    // إضافة رسالة الهدية
    await addDoc(collection(db, "rooms", currentRoomId, "messages"), {
      uid: currentUser.uid,
      name: currentUserData?.username || 'مستخدم',
      avatar: currentUserData?.avatarUrl || '',
      avatarType: currentUserData?.avatarType || 'emoji',
      emoji: currentUserData?.emoji || '👤',
      colors: currentUserData?.colors || {},
      text: `🎁 أهدى ${targetMember.name} هدية: ${gift.name}`,
      gift: {

        image: gift.image

      timestamp: Date.now()

    closeGiftRecipientModal();
    showToast(`تم إرسال ${gift.name} إلى ${targetMember.name}`);

    if (!confirm('هل أنت متأكد من حذف الغرفة؟ لا يمكن التراجع عن هذا الإجراء.')) return;
    
    await deleteDoc(doc(db, "rooms", currentRoomId));
    leaveRoom();

  };

  window.leaveRoom = async () => {
    if (!currentRoomId) return;
    
    // معالجة الأيقونات الخاصة
    const occupants = currentRoom?.iconOccupants || {};
    for (const [type, occupant] of Object.entries(occupants)) {
      if (occupant?.uid === currentUser.uid) {
        const earned = Math.floor((Date.now() - occupant.joinedAt) / 3600000);
        if (earned > 0) {
          await updateDoc(doc(db, "resources", currentUser.uid), { gold: increment(earned) });
          resources.gold += earned;
        }
        const newOccupants = { ...occupants };
        delete newOccupants[type];
        await updateDoc(doc(db, "rooms", currentRoomId), { iconOccupants: newOccupants });
      }
    }
    
    // إزالة العضو من الغرفة
    const updatedMembers = (currentRoom?.members || []).filter(m => m.uid !== currentUser.uid);
    await updateDoc(doc(db, "rooms", currentRoomId), { members: updatedMembers });
    
    // إعادة عرض واجهة الغرف
    document.querySelector('.rooms-header').style.display = 'flex';
    document.querySelector('.search-section').style.display = 'flex';
    document.querySelector('.rooms-container').style.display = 'block';
    
    document.getElementById('chatRoomView')?.classList.remove('active');
    document.getElementById('membersPanel')?.classList.remove('active');
    
    if (unsubscribeMessages) unsubscribeMessages();
    if (unsubscribeRoom) unsubscribeRoom();
    currentRoom = null;
    currentRoomId = null;
  };

  // تحديث المؤقتات كل ثانية
  setInterval(() => {
    if (currentRoom?.type === 'advanced') {
      renderSpecialIcons();
    }
  }, 1000);

  // تهيئة المصادقة
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
      subscribeToRooms();
    } else {
      const container = document.getElementById('roomsContainer');
      if (container) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-sign-in-alt"></i>
            <p>يرجى تسجيل الدخول للوصول إلى الغرف</p>
          </div>
        `;
      }
    }
  });
</script>
</body>
</html>
