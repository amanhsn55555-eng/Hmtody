<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>الواجهة الرئيسية • منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tajawal', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f5f7fa 0%, #e8eef5 100%);
      min-height: 100vh;
      padding-bottom: 85px;
      padding-top: 95px;
      color: #0f172a;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
      -webkit-tap-highlight-color: transparent;
    }

    /* ========== هيدر علوي مصغر ========== */
    .compact-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 8px 12px;
      z-index: 999;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
      border-bottom: 1px solid rgba(251, 191, 36, 0.2);
    }

    .resources-row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #ffffff, #fafcff);
      padding: 4px 10px 4px 8px;
      border-radius: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      border: 1px solid rgba(120, 80, 200, 0.06);
      flex: 1;
      justify-content: center;
    }

    .resource-icon {
      width: 26px;
      height: 26px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background: #f8fafc;
    }

    .gold .resource-icon { background: linear-gradient(145deg, #fbbf24, #f59e0b); color: white; }
    .elixir .resource-icon { background: linear-gradient(145deg, #a78bfa, #8b5cf6); color: white; }
    .money .resource-icon { background: linear-gradient(145deg, #34d399, #10b981); color: white; }
    .oil .resource-icon { background: linear-gradient(145deg, #2dd4bf, #0d9488); color: white; }

    .resource-value { 
      font-weight: 800; 
      font-size: 13px; 
      color: #1e293b; 
    }
    .resource-label { 
      font-size: 8px; 
      color: #64748b; 
      font-weight: 600; 
      margin-right: 2px; 
    }

    .search-row {
      margin-top: 8px;
    }

    .mini-search-wrapper {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 2px 2px 2px 10px;
      border: 1px solid rgba(251, 191, 36, 0.15);
    }

    .mini-search-wrapper i { 
      color: #fbbf24; 
      font-size: 13px; 
      margin-left: 5px;
    }
    
    .mini-search-wrapper input {
      flex: 1;
      border: none;
      padding: 8px 8px 8px 0;
      font-size: 13px;
      background: transparent;
      outline: none;
      direction: rtl;
      font-weight: 500;
    }
    
    .mini-search-wrapper input::placeholder { 
      color: #94a3b8; 
      font-size: 12px; 
    }
    
    .mini-search-wrapper button {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border: none;
      color: #0f172a;
      padding: 7px 12px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    /* ========== المحتوى ========== */
    .app-container {
      padding: 5px 10px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* بطاقة منشور */
    .post-card {
      background: linear-gradient(145deg, #ffffff 0%, #fbfdff 100%);
      border-radius: 24px;
      padding: 16px 14px 14px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px -8px rgba(0, 20, 60, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.9);
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }

    .post-card.promoted {
      border: 2px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(135deg, #fbbf24, #ec4899, #8b5cf6) border-box;
    }

    .post-card.promoted::before {
      content: "✨ مروّج ✨";
      position: absolute;
      top: 10px;
      left: 14px;
      background: linear-gradient(135deg, #fbbf24, #ec4899);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .follow-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 6px 15px -4px rgba(99, 102, 241, 0.2);
      border: 3px solid white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .post-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .post-user-details { flex: 1; }

    .post-username {
      font-weight: 800;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin-bottom: 3px;
    }

    .user-id-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
    }

    /* علامة التوثيق */
    .verified-badge {
      color: #3b82f6;
      font-size: 14px;
      margin-right: 4px;
    }

    /* تنسيق خاص للمعرف حسب عدد الأرقام */
    .id-1-digit {
      color: #00ff00 !important;
      font-size: 16px !important;
      font-weight: 900 !important;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
      animation: glow3d 1.5s ease-in-out infinite alternate;
      border: 3px solid gold !important;
      padding: 4px 12px !important;
      border-radius: 30px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      box-shadow: 0 0 20px gold;
    }

    .id-2-digit {
      color: #0088ff !important;
      font-size: 15px !important;
      font-weight: 800 !important;
      text-shadow: 0 0 8px #0088ff;
      border: 3px solid #ff4500 !important;
      padding: 4px 12px !important;
      border-radius: 20px;
      background: linear-gradient(145deg, #1e1e2f, #2a2a4a);
      box-shadow: 0 0 15px #ff4500, inset 0 0 5px #ff4500;
    }

    .id-3-digit {
      color: #ff3333 !important;
      font-size: 15px !important;
      font-weight: 800 !important;
      font-family: 'Reem Kufi', 'Tajawal', sans-serif;
      border: 3px solid #87ceeb !important;
      padding: 4px 12px !important;
      border-radius: 25px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      box-shadow: 0 0 15px #87ceeb, inset 0 0 5px #87ceeb;
    }

    @keyframes glow3d {
      from { text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00; transform: scale(1); }
      to { text-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00, 0 0 45px #00ff00; transform: scale(1.02); }
    }

    .post-time {
      font-size: 10px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .post-menu {
      color: #94a3b8;
      padding: 6px 3px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      gap: 8px;
    }

    .post-menu i {
      cursor: pointer;
      transition: all 0.2s;
      padding: 5px;
      border-radius: 50%;
    }

    .post-menu i:hover {
      background: #f1f5f9;
      color: #ef4444;
    }

    .promote-icon {
      color: #fbbf24 !important;
    }

    .promote-icon:hover {
      color: #f59e0b !important;
    }

    .post-content {
      font-size: 14px;
      line-height: 1.6;
      margin: 10px 0 14px;
      word-break: break-word;
      padding: 0 2px;
    }

    .post-interactions {
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #eef2f6;
      padding-top: 12px;
      margin-top: 4px;
    }

    .interact-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 30px;
      background: #f8fafc;
      color: #475569;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .interact-btn i { font-size: 16px; }
    .interact-btn.liked { color: #e11d48; background: #ffe4e6; }

    /* ========== هيدر سفلي ========== */
    .compact-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 6px 8px 10px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(251, 191, 36, 0.15);
      box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.03);
      z-index: 1000;
      border-radius: 25px 25px 0 0;
    }

    .footer-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #64748b;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 15px;
      min-width: 60px;
      transition: all 0.3s;
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      border: 1px solid rgba(251, 191, 36, 0.15);
      position: relative;
      overflow: hidden;
    }

    .footer-icon::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(251, 191, 36, 0.4), transparent);
      transform: rotate(45deg);
      animation: lightMove 3s infinite;
    }

    @keyframes lightMove {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .footer-icon i { font-size: 22px; margin-bottom: 3px; position: relative; z-index: 1; }
    .footer-icon span { position: relative; z-index: 1; }
    .footer-icon:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(251, 191, 36, 0.2);
    }

    /* أيقونة الماسنجر مع عداد الإشعارات */
    .messenger-icon-wrapper {
      position: relative;
    }

    .unread-badge-messenger {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: 800;
      min-width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      border: 2px solid white;
      z-index: 2;
    }

    /* أيقونة حسابي بشكل الصورة الشخصية */
  #accountAvatarCircle{border:1px solid rgba(251,191,36,0.15)!important;}
    .account-icon-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .account-avatar-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      overflow: hidden;
      border: 3px solid;
      box-shadow: 0 6px 15px -4px rgba(99, 102, 241, 0.2);
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      margin-bottom: 3px;
    }

    .account-avatar-circle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .account-label {
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
    }

  
    .publish-oil-btn {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px -5px #0f172a80, 0 0 0 3px rgba(255,255,255,0.9);
      margin-top: -30px;
      border: 2px solid #fbbf24;
      cursor: pointer;
      transition: all 0.3s;
    }

    .publish-oil-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 30px -5px #0f172a;
    }

    .publish-oil-btn i { 
      font-size: 24px; 
      color: #fbbf24; 
    }

    /* ========== نوافذ ========== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-sheet {
      background: white;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.3s ease;
      box-shadow: 0 -10px 50px rgba(0,0,0,0.15);
      padding: 20px 16px 30px;
      border-radius: 30px 30px 0 0;
      margin: auto;
    }

    @media (max-width: 500px) {
      .modal-sheet {
        max-width: 100%;
        height: 100%;
        max-height: 100vh;
        border-radius: 0;
      }
    }

    .active .modal-sheet { transform: scale(1); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eef2f6;
    }

    .modal-header h3 { 
      font-size: 20px; 
      font-weight: 800; 
      color: #0f172a; 
    }
    
    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 30px;
      background: #f1f5f9;
      border: none;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
    }

    /* ========== تنسيق التعليقات ========== */
    .comment-item {
      background: #f8fafc;
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .comment-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
      border: 2px solid;
      flex-shrink: 0;
    }

    .comment-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .comment-author {
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .comment-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 15px;
    }

    .comment-text {
      font-size: 13px;
      margin: 8px 0;
      padding-right: 8px;
    }

    .comment-time {
      font-size: 10px;
      color: #64748b;
    }

    /* ========== صفحة تعديل الحساب ========== */
    .avatar-selector {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    .avatar-option {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: #f8fafc;
      border: 3px solid transparent;
      cursor: pointer;
      overflow: hidden;
    }

    .avatar-option img { 
      width: 100%; 
      height: 100%; 
      border-radius: 50%; 
      object-fit: cover; 
    }
    
    .avatar-option.selected { 
      border-color: #fbbf24; 
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2); 
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    .image-item {
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: 3px solid transparent;
    }

    .image-item img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    
    .image-item.selected { 
      border-color: #fbbf24; 
    }

    .color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 10px;
      background: #f8fafc;
      border-radius: 14px;
    }

    .color-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #334155;
      font-size: 14px;
    }

    .color-row input[type="color"] {
      width: 55px;
      height: 38px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
    }

    .user-id-section {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      padding: 15px;
      border-radius: 18px;
      text-align: center;
      margin: 20px 0;
    }

    .user-id-section label {
      display: block;
      font-size: 12px;
      color: #92400e;
      margin-bottom: 5px;
    }

    .user-id-section .id-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #0f172a;
    }

    .btn-save {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      margin-top: 15px;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 14px;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }

    /* ========== المتابعين ========== */
    .followers-stats {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      padding: 15px;
      background: #f8fafc;
      border-radius: 20px;
    }

    .stat-item {
      text-align: center;
      cursor: pointer;
      padding: 10px 20px;
      border-radius: 15px;
      transition: all 0.2s;
    }

    .stat-item:hover {
      background: #eef2f6;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 5px;
    }

    .follower-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #f8fafc;
      border-radius: 15px;
      margin-bottom: 10px;
    }

    .follower-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .follower-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      overflow: hidden;
      border: 2px solid;
    }

    .follower-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remove-follow-btn {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    /* أيقونة الإعدادات في الملف الشخصي */
    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .settings-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #475569;
      font-size: 18px;
    }

    .settings-icon:hover {
      background: #fbbf24;
      color: white;
    }

    /* ========== إشعار ========== */
    #toastMsg {
      position: fixed;
      bottom: 100px;
      left: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 14px 20px;
      border-radius: 50px;
      text-align: center;
      z-index: 5000;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      max-width: 400px;
      margin: 0 auto;
      font-weight: 600;
      font-size: 14px;
    }

function playNotificationSound() {
  try {
    // استخدام Web Audio API لتوليد صوت البوسة
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // منشئ الصوت الرئيسي (Oscillator) لصوت "مممم" الناعم
    const osc = audioContext.createOscillator();
    osc.type = 'sine'; // موجة جيبية ناعمة
    osc.frequency.value = 400; // تردد متوسط النعومة

    // منشئ ثاني لإضافة طبقة صوتية "بوب"
    const osc2 = audioContext.createOscillator();
    osc2.type = 'triangle'; // موجة مثلثة تعطي تأثير "فرقعة" ناعمة
    osc2.frequency.value = 800;

    // عقدة التحكم في الصوت (Gain) لعمل تلاشي سريع
    const gainNode = audioContext.createGain();
    const gainNode2 = audioContext.createGain();
    
    // توصيل المكونات
    osc.connect(gainNode);
    osc2.connect(gainNode2);
    gainNode.connect(audioContext.destination);
    gainNode2.connect(audioContext.destination);

    const now = audioContext.currentTime;

    // ضبط مستوى الصوت العام
    gainNode.gain.setValueAtTime(0.1, now);
    gainNode2.gain.setValueAtTime(0.05, now);

    // انخفاض سريع جداً (تلاشي) لعمل تأثير "بوس"
    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    gainNode2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

    // بدء الصوت
    osc.start(now);

  function subscribeToPosts() {
    if (unsubscribePosts) unsubscribePosts();
    
    const postsQuery = query(collection(db, "posts"));
    unsubscribePosts = onSnapshot(postsQuery, (snapshot) => {
      posts = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.views === undefined) data.views = 0;
        posts.push({ id: doc.id, ...data });
      });
      renderPosts();
    });
  }

  function renderPosts() {
    const container = document.getElementById('postsContainer');
    if (!container) return;
    
    let filtered = posts.filter(p => 
      (p.content || '').includes(searchTerm) || 
      (p.username || '').includes(searchTerm) || 
      (p.userId || '').includes(searchTerm)
    );
    
    if (filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:50px"><i class="fas fa-feather" style="font-size:45px;opacity:0.3"></i><p style="margin-top:15px;color:#64748b;">لا توجد منشورات</p></div>`;
      return;
    }

    const now = Date.now();
    const sorted = [...filtered].sort((a, b) => {
      const aPromo = (a.promotedUntil || 0) > now ? 1 : 0;
      const bPromo = (b.promotedUntil || 0) > now ? 1 : 0;
      if (aPromo !== bPromo) return bPromo - aPromo;
      
      const aFollowed = isFollowing(a.userId) ? 1 : 0;
      const bFollowed = isFollowing(b.userId) ? 1 : 0;
      if (aFollowed !== bFollowed) return bFollowed - aFollowed;
      
      return (b.timestamp || 0) - (a.timestamp || 0);
    });

    container.innerHTML = sorted.map(post => {
      const isLiked = (post.likedBy || []).includes(currentUser?.uid);
      const isPromoted = (post.promotedUntil || 0) > now;
      const isOwner = post.userId === currentUserData?.userId;
      const followed = isFollowing(post.userId);
      const idClass = getIdClass(post.userId);
      const isVerified = post.verified || false;
      
      return `
      <div class="post-card ${isPromoted ? 'promoted' : ''}">
        ${followed && !isOwner ? '<div class="follow-badge"><i class="fas fa-check"></i> متابَع</div>' : ''}
        <div class="post-header">
          <div class="post-avatar" onclick="window.openProfile('${post.userId}')" style="border-color: ${post.colors?.frame || '#fbbf24'};">${renderAvatar(post)}</div>
          <div class="post-user-details">
            <div class="post-username" onclick="window.openProfile('${post.userId}')" style="color:${post.colors?.name || '#0f172a'}">
              ${post.username || 'مستخدم'}
              ${isVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
              <span class="user-id-badge ${idClass}" style="background:${post.colors?.frame || '#fbbf24'};">#${post.userId || ''}</span>
            </div>
            <div class="post-time"><i class="far fa-clock"></i> ${post.timestamp ? new Date(post.timestamp).toLocaleString('ar-SA') : 'الآن'}</div>
          </div>
          <div class="post-menu">
            ${isOwner ? `
              <i class="fas fa-trash" onclick="window.deletePost('${post.id}')" title="حذف"></i>
              <i class="fas fa-edit" onclick="window.editPost('${post.id}')" title="تعديل"></i>
              <i class="fas fa-chart-line promote-icon" onclick="window.promotePost('${post.id}')" title="ترويج"></i>
            ` : ''}
          </div>
        </div>
        <div class="post-content" style="color:${post.colors?.postText || post.colors?.text || '#334155'}">${post.content || ''}</div>
        <div class="post-interactions">
          <div class="interact-btn ${isLiked ? 'liked' : ''}" onclick="window.toggleLike('${post.id}')"><i class="fas fa-heart"></i> <span>${post.likes || 0}</span></div>
          <div class="interact-btn" onclick="window.openComments('${post.id}')"><i class="fas fa-comment"></i> ${(post.comments || []).length}</div>
          <div class="interact-btn"><i class="fas fa-eye"></i> ${post.views || 0}</div>

  window.promotePost = async function(postId) {
    const post = posts.find(p => p.id === postId);
    if (!post || post.userId !== currentUserData?.userId) return;
    
    showBeautifulPrompt(
        '📈 ترويج المنشور',
        `أدخل عدد الأيام (1 إكسير لليوم)\nالإكسير المتوفر: ${resources.elixir || 0}`,

            const daysNum = parseInt(days);

                showToast('❌ الرجاء إدخال رقم صحيح', false);
                return;
            }

                return;

                promotedUntil: Date.now() + daysNum * 86400000
            });

      <div class="avatar-section">
        <div style="font-weight:600; margin:15px 0 10px;"><i class="fas fa-smile"></i> اختر إيموجي</div>
        <div class="avatar-selector">${emojis.map(e => `<div class="avatar-option ${currentUserData.emoji === e && currentUserData.avatarType === 'emoji' ? 'selected' : ''}" onclick="window.selectEmoji('${e}')">${e}</div>`).join('')}</div>
      </div>
      
      <div class="avatar-section">
        <div style="font-weight:600; margin:15px 0 10px;"><i class="fas fa-image"></i> اختر صورة</div>
        <div class="image-grid">${imageUrls.map(url => `<div class="image-item ${currentUserData.avatarUrl === url && currentUserData.avatarType === 'image' ? 'selected' : ''}" onclick="window.selectImage('${url}')"><img src="${url}"></div>`).join('')}</div>
      </div>
      
      <div class="colors-section">
        <div style="font-weight:600; margin:15px 0 10px;"><i class="fas fa-palette"></i> تخصيص الألوان</div>
        
        <div class="color-row"><label><i class="fas fa-border-all"></i> لون الإطار</label><input type="color" id="editFrameColor" value="${currentUserData.colors?.frame || '#fbbf24'}"></div>
        <div class="color-row"><label><i class="fas fa-signature"></i> لون الاسم</label><input type="color" id="editNameColor" value="${currentUserData.colors?.name || '#0f172a'}"></div>
        <div class="color-row"><label><i class="fas fa-id-badge"></i> لون المعرف</label><input type="color" id="editIdColor" value="${currentUserData.colors?.id || '#8b5cf6'}"></div>
        <div class="color-row"><label><i class="fas fa-pen"></i> لون كتابة المنشور</label><input type="color" id="editPostTextColor" value="${currentUserData.colors?.postText || '#334155'}"></div>
        <div class="color-row"><label><i class="fas fa-comment"></i> لون خط التعليق</label><input type="color" id="editCommentTextColor" value="${currentUserData.colors?.commentText || '#475569'}"></div>
      </div>
      
      <div class="password-section">
        <h4><i class="fas fa-lock"></i> تغيير كلمة المرور</h4>
        <input type="password" id="currentPassword" class="password-input" placeholder="كلمة المرور الحالية">
        <input type="password" id="newPassword" class="password-input" placeholder="كلمة المرور الجديدة">
        <input type="password" id="confirmPassword" class="password-input" placeholder="تأكيد كلمة المرور الجديدة">
        <button class="btn-save" style="margin-top:10px;" onclick="window.changePassword()">
          <i class="fas fa-key"></i> تغيير كلمة المرور
        </button>
      </div>
      
      <button class="btn-save" onclick="window.saveAccountChanges()"><i class="fas fa-save"></i> 💾 حفظ التعديلات</button>
      <button class="btn-danger" onclick="window.handleLogout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    `;
    
    openModal('accountModal');
  }

  window.selectEmoji = function(emoji) {
    currentUserData.emoji = emoji;
    currentUserData.avatarType = 'emoji';
    currentUserData.avatarUrl = '';
    document.querySelectorAll('.avatar-option, .image-item').forEach(el => el.classList.remove('selected'));
    event.target.closest('.avatar-option')?.classList.add('selected');
  };

  window.selectImage = function(url) {
    currentUserData.avatarUrl = url;
    currentUserData.avatarType = 'image';
    document.querySelectorAll('.avatar-option, .image-item').forEach(el => el.classList.remove('selected'));
    event.target.closest('.image-item')?.classList.add('selected');
  };

  window.saveAccountChanges = async function() {
    if (!currentUser) return;
    
    currentUserData.username = document.getElementById('editUsername')?.value || currentUserData.username;
    currentUserData.colors = {
      frame: document.getElementById('editFrameColor')?.value || '#fbbf24',
      name: document.getElementById('editNameColor')?.value || '#0f172a',
      id: document.getElementById('editIdColor')?.value || '#8b5cf6',
      postText: document.getElementById('editPostTextColor')?.value || '#334155',
      commentText: document.getElementById('editCommentTextColor')?.value || '#475569',
      text: document.getElementById('editPostTextColor')?.value || '#334155'
    };
    
    await setDoc(doc(db, "users", currentUser.uid), currentUserData, { merge: true });
    
    updateAccountIcon();
    closeModal('accountModal');
    renderPosts();
    showToast('✅ تم حفظ التغييرات');
  };

  window.changePassword = async function() {
    const currentPass = document.getElementById('currentPassword')?.value;
    const newPass = document.getElementById('newPassword')?.value;
    const confirmPass = document.getElementById('confirmPassword')?.value;
    
    if (!currentPass || !newPass || !confirmPass) {
      showToast('جميع الحقول مطلوبة', false);
      return;
    }
    
    if (newPass !== confirmPass) {
      showToast('كلمة المرور الجديدة غير متطابقة', false);
      return;
    }
    
    if (newPass.length < 6) {
      showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', false);
      return;
    }
    
    try {
      const credential = EmailAuthProvider.credential(currentUser.email, currentPass);
      await reauthenticateWithCredential(currentUser, credential);
      await updatePassword(currentUser, newPass);
      showToast('✅ تم تغيير كلمة المرور بنجاح');
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
    } catch (error) {
      showToast('❌ كلمة المرور الحالية غير صحيحة', false);
    }
  };

  window.handleLogout = async function() {
    try {
      await signOut(auth);
      localStorage.removeItem('currentUser');
      showToast('تم تسجيل الخروج بنجاح');
      setTimeout(() => {
        window.location.reload();
      }, 1500);
    } catch (error) {
      showToast('خطأ في تسجيل الخروج', false);
    }
  };

  window.clearSearch = function() {
    document.getElementById('searchInput').value = '';
    searchTerm = '';
    renderPosts();
  };

  window.openMenuModal = function() {
    openModal('menuModal');
  };

  function showBeautifulPrompt(title, placeholder, defaultValue, callback) {
    const existingBox = document.getElementById('beautifulPromptBox');
    if (existingBox) existingBox.remove();
    
    const promptBox = document.createElement('div');
    promptBox.id = 'beautifulPromptBox';
    promptBox.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 380px;
        background: linear-gradient(145deg, #ffffff, #fafcff);
        border-radius: 30px;
        padding: 25px 20px;
        box-shadow: 0 30px 50px rgba(0,0,0,0.2), 0 0 0 3px #fbbf24;
        z-index: 10000;
        direction: rtl;
        animation: popIn 0.3s ease;
    `;
    
    if (!document.getElementById('promptAnimation')) {
        const style = document.createElement('style');
        style.id = 'promptAnimation';
        style.textContent = `
            @keyframes popIn {
                from { opacity: 0; transform: translate(-50%, -45%); }
                to { opacity: 1; transform: translate(-50%, -50%); }
            }
            @keyframes popOut {
                from { opacity: 1; transform: translate(-50%, -50%); }
                to { opacity: 0; transform: translate(-50%, -45%); }
            }
        `;
        document.head.appendChild(style);
    }
    
    const overlay = document.createElement('div');
    overlay.style.cssText = `
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        z-index: 9999;
        animation: fadeIn 0.3s ease;
    `;
    overlay.onclick = function() {
        promptBox.style.animation = 'popOut 0.2s ease forwards';
        overlay.style.opacity = '0';
        setTimeout(() => {
            promptBox.remove();
            overlay.remove();
        }, 200);
    };
    
    promptBox.innerHTML = `
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="fas fa-pen" style="font-size: 40px; color: #fbbf24; background: #fef3c7; padding: 12px; border-radius: 50%;"></i>
        </div>
        <h3 style="margin: 0 0 5px 0; color: #0f172a; font-weight: 800; text-align: center;">${title}</h3>
        <p style="margin: 0 0 20px 0; color: #64748b; font-size: 13px; text-align: center;">${placeholder}</p>
        <input type="text" id="beautifulPromptInput" value="${defaultValue}" style="
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            text-align: right;
            direction: rtl;
            margin-bottom: 20px;
            transition: all 0.2s;
            outline: none;
        " autofocus>
        <div style="display: flex; gap: 10px;">
            <button id="promptConfirmBtn" style="
                flex: 2;
                padding: 14px;
                background: linear-gradient(135deg, #fbbf24, #f59e0b);
                border: none;
                border-radius: 40px;
                color: #0f172a;
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
            ">تأكيد</button>
            <button id="promptCancelBtn" style="
                flex: 1;
                padding: 14px;
                background: #f1f5f9;
                border: none;
                border-radius: 40px;
                color: #64748b;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
            ">إلغاء</button>
        </div>
    `;
    
    document.body.appendChild(overlay);
    document.body.appendChild(promptBox);
    
    const input = document.getElementById('beautifulPromptInput');
    input.focus();
    input.select();
    
    const closePrompt = (value) => {
        promptBox.style.animation = 'popOut 0.2s ease forwards';
        overlay.style.opacity = '0';
        setTimeout(() => {
            promptBox.remove();
            overlay.remove();
            if (callback) callback(value);
        }, 200);
    };
    
    document.getElementById('promptConfirmBtn').onclick = () => closePrompt(input.value);
    document.getElementById('promptCancelBtn').onclick = () => closePrompt(null);
    
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            closePrompt(input.value);
        }
    });
    
    const fadeStyle = document.createElement('style');
    fadeStyle.textContent = `
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    `;
    document.head.appendChild(fadeStyle);
  }

  function showConfirmDialog(title, message, confirmText, cancelText, callback) {
    const existingBox = document.getElementById('beautifulPromptBox');
    if (existingBox) existingBox.remove();
    
    const promptBox = document.createElement('div');
    promptBox.id = 'beautifulPromptBox';
    promptBox.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 350px;
        background: linear-gradient(145deg, #ffffff, #fafcff);
        border-radius: 30px;
        padding: 25px 20px;
        box-shadow: 0 30px 50px rgba(0,0,0,0.2), 0 0 0 3px #fbbf24;
        z-index: 10000;
        direction: rtl;
        animation: popIn 0.3s ease;
        text-align: center;
    `;
    
    const overlay = document.createElement('div');
    overlay.style.cssText = `
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        z-index: 9999;
    `;
    overlay.onclick = () => closeDialog(false);
    
    promptBox.innerHTML = `
        <div style="margin-bottom: 15px;">
            <i class="fas fa-trash" style="font-size: 45px; color: #ef4444; background: #fee2e2; padding: 12px; border-radius: 50%;"></i>
        </div>
        <h3 style="margin: 0 0 10px 0; color: #0f172a; font-weight: 800;">${title}</h3>
        <p style="margin: 0 0 25px 0; color: #64748b; font-size: 14px;">${message}</p>
        <div style="display: flex; gap: 10px;">
            <button id="confirmYes" style="
                flex: 1;
                padding: 14px;
                background: #ef4444;
                border: none;
                border-radius: 40px;
                color: white;
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
            ">${confirmText}</button>
            <button id="confirmNo" style="
                flex: 1;
                padding: 14px;
                background: #f1f5f9;
                border: none;
                border-radius: 40px;
                color: #64748b;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
            ">${cancelText}</button>
        </div>
    `;
    
    const closeDialog = (result) => {
        promptBox.style.animation = 'popOut 0.2s ease forwards';
        overlay.style.opacity = '0';
        setTimeout(() => {
            promptBox.remove();
            overlay.remove();
            if (callback) callback(result);
        }, 200);
    };
    
    document.body.appendChild(overlay);
    document.body.appendChild(promptBox);
    
    document.getElementById('confirmYes').onclick = () => closeDialog(true);
    document.getElementById('confirmNo').onclick = () => closeDialog(false);
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
      
      if (!currentUserData?.userId) {
        const userId = user.uid.slice(0, 6);
        currentUserData = { ...currentUserData, userId: userId };
        await setDoc(doc(db, "users", user.uid), currentUserData, { merge: true });
        await setDoc(doc(db, "users_by_id", userId), { uid: user.uid });
      }
      
      subscribeToPosts();
      subscribeToUnreadMessages();
      
      // مراقبة الرسائل الجديدة وتشغيل الصوت
      const messagesQuery = query(collection(db, "chats"));
      onSnapshot(messagesQuery, (snapshot) => {
        let hasNewMessage = false;
        snapshot.docChanges().forEach(change => {
          if (change.type === 'modified') {
            const data = change.doc.data();
            const unread = data.unreadCount?.[currentUser.uid] || 0;
            if (unread > 0) {
              hasNewMessage = true;
            }
          }
        });
        if (hasNewMessage) {
          playNotificationSound();
        }
      });
    } else {
      const container = document.getElementById('postsContainer');
      if (container) {
        container.innerHTML = `
          <div style="text-align:center;padding:50px;">
            <i class="fas fa-sign-in-alt" style="font-size:50px;opacity:0.5;margin-bottom:20px;"></i>
            <h3 style="color:#0f172a;margin-bottom:10px;">يرجى تسجيل الدخول</h3>
            <p style="color:#64748b;margin-bottom:20px;">يجب عليك تسجيل الدخول للوصول إلى المنصة</p>
            <button onclick="window.location.reload()" style="background:#fbbf24;border:none;padding:12px 30px;border-radius:30px;font-weight:700;cursor:pointer;">
              <i class="fas fa-sync-alt"></i> تحديث الصفحة
            </button>
          </div>
        `;
      }
    }
  });

  window.addEventListener('load', () => {
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderPosts();
      });
    }

    document.getElementById('accountBtn')?.addEventListener('click', () => {
      if (currentUserData) {
        window.openProfile(currentUserData.userId);
      } else {
        openAccountModal();
      }
    });
    
    document.getElementById('mainPublishBtn')?.addEventListener('click', () => openModal('publishModal'));
    
    const postText = document.getElementById('postText');
    if (postText) {
      postText.addEventListener('input', function() {
        document.getElementById('charCounter').innerText = this.value.length + '/500';
      });
    }

    document.querySelectorAll('.close-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        this.closest('.modal-overlay')?.classList.remove('active');
      });
    });

    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
      });
    });
  });

  window.showToast = showToast;
  window.closeModal = closeModal;
  window.openModal = openModal;
  window.openProfile = window.openProfile;
  window.toggleLike = window.toggleLike;
  window.openComments = window.openComments;
  window.submitComment = window.submitComment;
  window.deleteComment = window.deleteComment;
  window.promotePost = window.promotePost;
  window.editPost = window.editPost;
  window.publishPost = window.publishPost;
  window.deletePost = window.deletePost;
  window.followUser = window.followUser;
  window.showFollowersList = window.showFollowersList;
  window.removeFollower = window.removeFollower;
  window.unfollowUser = window.unfollowUser;
  window.openPrivateChat = window.openPrivateChat;
  window.openAccountSettings = window.openAccountSettings;
  window.selectEmoji = window.selectEmoji;
  window.selectImage = window.selectImage;
  window.saveAccountChanges = window.saveAccountChanges;
  window.changePassword = window.changePassword;
  window.clearSearch = window.clearSearch;
  window.handleLogout = window.handleLogout;
  window.openMenuModal = window.openMenuModal;
</script>
</body>
</html>
