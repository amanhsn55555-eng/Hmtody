.menu-modal *,

.settings-icon i,
.close-btn i {

/* تعديل الهوامش لتتناسب مع الوضع الجديد */

    margin-left: 5px !important;

    /* ========== هيدر علوي مصغر ========== */

    /* ========== المحتوى ========== */
    .app-container {

    /* بطاقة منشور */
    .post-card {
      background: linear-gradient(145deg, #ffffff 0%, #fbfdff 100%);
      border-radius: 24px;
      padding: 16px 14px 14px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px -8px rgba(0, 20, 60, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.9);
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }

    .post-card.promoted {
      border: 2px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(135deg, #fbbf24, #ec4899, #8b5cf6) border-box;
    }

    .post-card.promoted::before {
      content: "✨ مروّج ✨";
      position: absolute;
      top: 10px;
      left: 14px;
      background: linear-gradient(135deg, #fbbf24, #ec4899);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .follow-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;

      width: 48px;

      display: flex;
      align-items: center;
      justify-content: center;

      box-shadow: 0 6px 15px -4px rgba(99, 102, 241, 0.2);
      border: 3px solid white;

      overflow: hidden;

    /* ========== هيدر سفلي ========== */
    .compact-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 6px 8px 10px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(251, 191, 36, 0.15);
      box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.03);
      z-index: 1000;
      border-radius: 25px 25px 0 0;
    }

    .footer-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #64748b;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 15px;
      min-width: 60px;
      transition: all 0.3s;
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      border: 1px solid rgba(251, 191, 36, 0.15);
      position: relative;
      overflow: hidden;
    }

    .footer-icon::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(251, 191, 36, 0.4), transparent);
      transform: rotate(45deg);
      animation: lightMove 3s infinite;
    }

    @keyframes lightMove {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .footer-icon i { font-size: 22px; margin-bottom: 3px; position: relative; z-index: 1; }

/* ========== تأثيرات الحركة ========== */

@keyframes fireGlow {
    from { 
        text-shadow: 0 0 5px #dc2626, 0 0 10px #ef4444;
        transform: translate(-50%, -50%) scale(1); 
    }
    to { 
        text-shadow: 0 0 20px #dc2626, 0 0 40px #ef4444;
        transform: translate(-50%, -50%) scale(1.2); 
    }
}

@keyframes boltFlash {
    0%, 100% { 
        text-shadow: 0 0 10px #10b981, 0 0 20px #34d399;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    50% { 
        text-shadow: 0 0 30px #10b981, 0 0 60px #34d399;
        opacity: 0.7;
        transform: translate(-50%, -50%) scale(1.3);
    }
}

@keyframes starSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes starTwinkle {
    0%, 100% { 
        text-shadow: 0 0 5px currentColor, 0 0 10px currentColor;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    50% { 
        text-shadow: 0 0 25px currentColor, 0 0 50px currentColor;
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1.2);
    }
}

@keyframes diamondShine {
    0%, 100% { 
        text-shadow: 0 0 10px #3b82f6, 0 0 20px #93c5fd;
        filter: brightness(1);
        transform: translate(-50%, -50%) scale(1);
    }
    50% { 
        text-shadow: 0 0 30px #3b82f6, 0 0 60px #bfdbfe;
        filter: brightness(1.5);
        transform: translate(-50%, -50%) scale(1.15);
    }
}

/* ========== إخفاء أي نصوص إضافية ========== */
.trend-badge::after {
    display: none !important;
}
