    /* ========== المحتوى ========== */
    .app-container {
      padding: 5px 10px;
      max-width: 560px;
      margin: 0 auto;

    /* بطاقة منشور */
    .post-card {
      background: linear-gradient(145deg, #ffffff 0%, #fbfdff 100%);
      border-radius: 24px;
      padding: 16px 14px 14px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px -8px rgba(0, 20, 60, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.9);
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }

    .post-card.promoted {
      border: 2px solid transparent;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(135deg, #fbbf24, #ec4899, #8b5cf6) border-box;
    }

    .post-card.promoted::before {
      content: "✨ مروّج ✨";
      position: absolute;
      top: 10px;
      left: 14px;
      background: linear-gradient(135deg, #fbbf24, #ec4899);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .follow-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 30px;
      z-index: 2;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 6px 15px -4px rgba(99, 102, 241, 0.2);
      border: 3px solid white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .post-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .post-user-details { flex: 1; }

    .post-username {

      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin-bottom: 3px;
    }

    .user-id-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
    }

    /* علامة التوثيق */
    .verified-badge {

    }

    /* تنسيق خاص للمعرف حسب عدد الأرقام */
    .id-1-digit {
      color: #00ff00 !important;
      font-size: 16px !important;
      font-weight: 900 !important;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
      animation: glow3d 1.5s ease-in-out infinite alternate;
      border: 3px solid gold !important;
      padding: 4px 12px !important;
      border-radius: 30px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      box-shadow: 0 0 20px gold;
    }

    .id-2-digit {
      color: #0088ff !important;
      font-size: 15px !important;
      font-weight: 800 !important;
      text-shadow: 0 0 8px #0088ff;
      border: 3px solid #ff4500 !important;
      padding: 4px 12px !important;
      border-radius: 20px;
      background: linear-gradient(145deg, #1e1e2f, #2a2a4a);
      box-shadow: 0 0 15px #ff4500, inset 0 0 5px #ff4500;
    }

    .id-3-digit {
      color: #ff3333 !important;
      font-size: 15px !important;
      font-weight: 800 !important;
      font-family: 'Reem Kufi', 'Tajawal', sans-serif;
      border: 3px solid #87ceeb !important;
      padding: 4px 12px !important;
      border-radius: 25px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      box-shadow: 0 0 15px #87ceeb, inset 0 0 5px #87ceeb;
    }

    @keyframes glow3d {
      from { text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00; transform: scale(1); }
      to { text-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00, 0 0 45px #00ff00; transform: scale(1.02); }
    }

    .post-time {
      font-size: 10px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .post-menu {
      color: #94a3b8;
      padding: 6px 3px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      gap: 8px;
    }

    .post-menu i {
      cursor: pointer;
      transition: all 0.2s;
      padding: 5px;
      border-radius: 50%;
    }

    .post-menu i:hover {
      background: #f1f5f9;

    .promote-icon {

    .post-media img, .post-media iframe {
      width: 100%;
      max-height: 300px;
      object-fit: cover;

    .post-interactions {
      display: flex;

      align-items: center;

      padding-top: 12px;

    }

    .interact-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 30px;
      background: #f8fafc;
      color: #475569;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;

    .interact-btn i { font-size: 16px; }
    .interact-btn.liked { color: #e11d48; background: #ffe4e6; }

    /* ========== هيدر سفلي ========== */
    .compact-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 6px 8px 10px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(251, 191, 36, 0.15);
      box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.03);
      z-index: 1000;
      border-radius: 25px 25px 0 0;
    }

    .footer-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #64748b;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 15px;
      min-width: 60px;
      transition: all 0.3s;
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      border: 1px solid rgba(251, 191, 36, 0.15);
      position: relative;
      overflow: hidden;
    }

    .footer-icon::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(251, 191, 36, 0.4), transparent);
      transform: rotate(45deg);
      animation: lightMove 3s infinite;
    }

    @keyframes lightMove {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .footer-icon i { font-size: 22px; margin-bottom: 3px; position: relative; z-index: 1; }
    .footer-icon span { position: relative; z-index: 1; }
    .footer-icon:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(251, 191, 36, 0.2);
    }

    .publish-oil-btn {

    /* ========== نوافذ ========== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-sheet {
      background: white;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.3s ease;
      box-shadow: 0 -10px 50px rgba(0,0,0,0.15);
      padding: 20px 16px 30px;
      border-radius: 30px 30px 0 0;
      margin: auto;
    }

    @media (max-width: 500px) {
      .modal-sheet {
        max-width: 100%;
        height: 100%;
        max-height: 100vh;
        border-radius: 0;
      }
    }

    .active .modal-sheet { transform: scale(1); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eef2f6;
    }

    /* ========== صفحة تعديل الحساب ========== */

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, getDocs, addDoc, deleteDoc, onSnapshot, arrayUnion, arrayRemove, increment, serverTimestamp, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYKCCTcurNcJslrNKqdiJCoIIK-YZArB4",
    authDomain: "sbaq-fc46f.firebaseapp.com",
    projectId: "sbaq-fc46f",
    storageBucket: "sbaq-fc46f.firebasestorage.app",
    appId: "1:1026865750415:web:0ee39a717bcafaa0d06bfa"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentUserData = null;
  let resources = { gold: 10, elixir: 10, money: 1000, oil: 100 };
  let posts = [];
  let followers = {};
  let activePostId = null;
  let activeProfileUserId = null;
  let searchTerm = '';
  let unsubscribePosts = null;
  let unsubscribeChats = null;
  let unsubscribeStories = null;
  let currentFollowersListType = 'followers';
  let viewedPosts = new Set();
  let unreadMessagesCount = 0;
  let stories = [];

  const emojis = ['😎', '👑', '🦊', '🐼', '🐸', '🐶', '🦁', '🐧', '🐨', '🦝', '🐱', '🐻', '🦄', '🐙', '🦋', '👀', '⭐', '🌙', '☀️', '🔥', '💎', '🎮', '🫦', '💫'];
  
  const imageUrls = [
    'https://i.pravatar.cc/150?img=1', 'https://i.pravatar.cc/150?img=2', 'https://i.pravatar.cc/150?img=3',
    'https://i.pravatar.cc/150?img=4', 'https://i.pravatar.cc/150?img=5', 'https://i.pravatar.cc/150?img=6',
    'https://i.pravatar.cc/150?img=7', 'https://i.pravatar.cc/150?img=8', 'https://i.pravatar.cc/150?img=9',
    'https://i.pravatar.cc/150?img=10', 'https://i.pravatar.cc/150?img=11', 'https://i.pravatar.cc/150?img=12'
  ];

  function showToast(msg, isSuccess = true) { 
    const t = document.getElementById('toastMsg'); 
    if (!t) return;
    t.textContent = msg; 
    t.style.background = isSuccess ? '#10b981' : '#ef4444';
    t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function closeModal(id) { 
    document.getElementById(id)?.classList.remove('active'); 
  }
  
  function openModal(id) { 
    document.getElementById(id)?.classList.add('active'); 
  }

  function updateResourcesUI() {
    document.getElementById('goldAmount').textContent = resources.gold || 0;
    document.getElementById('elixirAmount').textContent = resources.elixir || 0;
    document.getElementById('moneyAmount').textContent = resources.money || 0;
    document.getElementById('oilAmount').textContent = resources.oil || 0;
  }

  function renderAvatar(user) {
    if (!user) return '👤';
    if (user.avatarType === 'image' && user.avatarUrl) {
      return `<img src="${user.avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.innerHTML='👤'">`;
    }
    return user.emoji || '😎';
  }

  function updateAccountIcon() {
    const avatarCircle = document.getElementById('accountAvatarCircle');
    if (!avatarCircle) return;
    
    if (currentUserData) {
      const frameColor = currentUserData.colors?.frame || '#fbbf24';
      avatarCircle.style.borderColor = frameColor;
      
      if (currentUserData.avatarType === 'image' && currentUserData.avatarUrl) {
        avatarCircle.innerHTML = `<img src="${currentUserData.avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.innerHTML='<span>👤</span>'">`;
      } else {
        avatarCircle.innerHTML = `<span>${currentUserData.emoji || '😎'}</span>`;
      }
    }
  }

  function isFollowing(userId) { 
    return followers[currentUser?.uid]?.includes(userId) || false; 
  }

  function getIdClass(userId) {
    if (!userId) return '';
    const idStr = String(userId);
    const digitCount = idStr.replace(/\D/g, '').length;
    if (digitCount === 1) return 'id-1-digit';
    if (digitCount === 2) return 'id-2-digit';
    if (digitCount === 3) return 'id-3-digit';
    return '';
  }

  async function loadUserData(uid) {
    try {
      const userDoc = await getDoc(doc(db, "users", uid));
      if (userDoc.exists()) {
        currentUserData = userDoc.data();
        updateAccountIcon();
      }
      
      const resourcesDoc = await getDoc(doc(db, "resources", uid));
      if (resourcesDoc.exists()) {
        resources = resourcesDoc.data();
      }
      updateResourcesUI();

      const followersDoc = await getDoc(doc(db, "social", "followers"));
      if (followersDoc.exists()) {
        followers = followersDoc.data();
      }
      
      const viewedDoc = await getDoc(doc(db, "viewed_posts", uid));
      if (viewedDoc.exists()) {
        viewedPosts = new Set(viewedDoc.data().posts || []);
      }
    } catch (error) {
      console.error("خطأ في تحميل البيانات:", error);
    }
  }

  function subscribeToUnreadMessages() {
    if (!currentUser) return;
    if (unsubscribeChats) unsubscribeChats();
    
    const chatsQuery = query(
      collection(db, "chats"),
      where("participants", "array-contains", currentUser.uid)
    );
    
    unsubscribeChats = onSnapshot(chatsQuery, (snapshot) => {
      let totalUnread = 0;
      snapshot.forEach(doc => {
        const data = doc.data();
        const unread = data.unreadCount?.[currentUser.uid] || 0;
        totalUnread += unread;
      });
      
      unreadMessagesCount = totalUnread;
      const badge = document.getElementById('unreadMessageBadge');
      if (badge) {
        if (totalUnread > 0) {
          badge.textContent = totalUnread > 99 ? '99+' : totalUnread;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      }
    });
  }

  
  function playNotificationSound() {
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioContext.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 400;
      const osc2 = audioContext.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.value = 800;
      const gainNode = audioContext.createGain();
      const gainNode2 = audioContext.createGain();
      osc.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioContext.destination);
      gainNode2.connect(audioContext.destination);
      const now = audioContext.currentTime;
      gainNode.gain.setValueAtTime(0.1, now);
      gainNode2.gain.setValueAtTime(0.05, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      gainNode2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      osc.start(now);
      osc2.start(now);
      osc.stop(now + 0.15);
      osc2.stop(now + 0.15);
    } catch (e) {}
  }

  function subscribeToPosts() {
    if (unsubscribePosts) unsubscribePosts();
    
    const postsQuery = query(collection(db, "posts"));
    unsubscribePosts = onSnapshot(postsQuery, (snapshot) => {
      posts = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.views === undefined) data.views = 0;
        if (data.shares === undefined) data.shares = 0;
        if (data.reports === undefined) data.reports = [];
        posts.push({ id: doc.id, ...data });
      });
      renderPosts();
    });
  }

  function subscribeToStories() {
    if (unsubscribeStories) unsubscribeStories();
    const now = Date.now();
    const storiesQuery = query(collection(db, "stories"), where("expiresAt", ">", now));
    unsubscribeStories = onSnapshot(storiesQuery, (snapshot) => {
      stories = [];
      snapshot.forEach(doc => {
        stories.push({ id: doc.id, ...doc.data() });
      });
      renderStoriesRow();
      if (activeProfileUserId) {
        renderProfileStories(activeProfileUserId);
      }
    });
  }

  function renderStoriesRow() {
    const container = document.getElementById('storiesContainer');
    
    if (!container) return;
    if (stories.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    const followingList = followers[currentUser?.uid] || [];
    const filteredStories = stories.filter(s => followingList.includes(s.userId) || s.userId === currentUserData?.userId);
    
    if (filteredStories.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    container.innerHTML = filteredStories.map(story => {
        return `
        <div class="story-item" onclick="window.viewStory('${story.id}')">
            <div class="story-avatar">
                ${story.avatarType === 'image' && story.avatarUrl ? `<img src="${story.avatarUrl}">` : `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#1e293b;border-radius:50%;color:white;font-size:30px;">${story.emoji || '👤'}</span>`}
            </div>
            <span class="story-name">${story.username || 'مستخدم'}</span>
        </div>
        `;
    }).join('');
  }

  function renderProfileStories(userId) {
    const container = document.getElementById('profileStoriesContainer');
    if (!container) return;
    
    const followingList = followers[currentUser?.uid] || [];
    const isOwnProfile = userId === currentUserData?.userId;
    
    let filteredStories;
    if (isOwnProfile) {
        // عرض ستورياتي وستوريات المتابعين
        filteredStories = stories.filter(s => followingList.includes(s.userId) || s.userId === userId);
    } else {
        // عرض ستوريات المستخدم فقط
        filteredStories = stories.filter(s => s.userId === userId);
    }
    
    if (filteredStories.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    container.innerHTML = filteredStories.map(story => {
        return `
        <div class="story-item" onclick="window.viewStory('${story.id}')">
            <div class="story-avatar">
                ${story.avatarType === 'image' && story.avatarUrl ? `<img src="${story.avatarUrl}">` : `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#1e293b;border-radius:50%;color:white;font-size:30px;">${story.emoji || '👤'}</span>`}
            </div>
            <span class="story-name">${story.username || 'مستخدم'}</span>
        </div>
        `;
    }).join('');
  }

  window.viewStory = function(storyId) {
      const story = stories.find(s => s.id === storyId);
      if (!story) return;
      
      const isOwner = story.userId === currentUserData?.userId;
      
      const contentDiv = document.getElementById('storyViewContent');
      contentDiv.innerHTML = `
        <div style="margin-bottom:20px; display:flex; align-items:center; gap:10px;">
            <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid gold;">
                ${story.avatarType === 'image' ? `<img src="${story.avatarUrl}" style="width:100%;height:100%;object-fit:cover;">` : `<span style="font-size:30px;">${story.emoji}</span>`}
            </div>
            <span style="font-weight:bold;">${story.username}</span>
            <span class="user-id-badge" style="background:gold;">#${story.userId}</span>
            ${isOwner ? `
                <div style="margin-right:auto; display:flex; gap:10px;">
                    <i class="fas fa-edit" onclick="window.editStory('${story.id}')" style="cursor:pointer; color:#fbbf24;"></i>
                    <i class="fas fa-trash" onclick="window.deleteStory('${story.id}')" style="cursor:pointer; color:#ef4444;"></i>
                </div>
            ` : ''}
        </div>
        <img src="${story.imageUrl}" style="max-width:100%; max-height:70vh; border-radius:20px; margin-bottom:20px;" onerror="this.src='https://via.placeholder.com/400x600?text=Story'">
        <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
            <button onclick="window.toggleStoryLike('${story.id}')" style="background:#fbbf24; border:none; padding:10px 20px; border-radius:30px; font-weight:bold;">
                <i class="fas fa-heart"></i> <span id="storyLikes_${story.id}">${story.likes || 0}</span>
            </button>
            <button onclick="window.showStoryCommentInput('${story.id}')" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:30px; font-weight:bold;">
                <i class="fas fa-comment"></i> تعليق
            </button>
        </div>
        <div id="storyComments_${story.id}" style="margin-top:20px; max-height:200px; overflow-y:auto;">
            ${(story.comments || []).map(c => `<p><strong>${c.username}:</strong> ${c.text}</p>`).join('')}
        </div>
      `;
      openModal('storyViewModal');
  };

  window.editStory = function(storyId) {
      const story = stories.find(s => s.id === storyId);
      if (!story) return;
      showBeautifulPrompt('تعديل الستوري', 'أدخل  الصورة الجديده', story.imageUrl, async (newUrl) => {
          if (newUrl && newUrl.startsWith('http')) {
              await updateDoc(doc(db, "stories", storyId), { imageUrl: newUrl });
              showToast('تم تعديل الستوري');
              closeModal('storyViewModal');
          }
      });
  };

  window.showStoryCommentInput = function(storyId) {
      showBeautifulPrompt('إضافة تعليق', 'اكتب تعليقك', '', async (text) => {
          if (!text) return;
          const comment = {
              username: currentUserData?.username || 'مستخدم',
              userId: currentUserData?.userId,
              text: text,
              timestamp: Date.now()
          };
          await updateDoc(doc(db, "stories", storyId), {
              comments: arrayUnion(comment)
          });
          showToast('تم إضافة التعليق');
          // تحديث العرض
          const story = stories.find(s => s.id === storyId);
          if (story) {
              const commentsDiv = document.getElementById(`storyComments_${storyId}`);
              if (commentsDiv) {
                  const updatedComments = [...(story.comments || []), comment];
                  commentsDiv.innerHTML = updatedComments.map(c => `<p><strong>${c.username}:</strong> ${c.text}</p>`).join('');
              }
          }
      });
  };

  window.toggleStoryLike = async function(storyId) {
      if (!currentUser) return;
      const storyRef = doc(db, "stories", storyId);
      const story = stories.find(s => s.id === storyId);
      if (!story) return;
      
      const likedBy = story.likedBy || [];
      if (likedBy.includes(currentUser.uid)) {
          await updateDoc(storyRef, { likedBy: arrayRemove(currentUser.uid), likes: increment(-1) });
      } else {
          await updateDoc(storyRef, { likedBy: arrayUnion(currentUser.uid), likes: increment(1) });
      }
  };

  window.deleteStory = async function(storyId) {
      await deleteDoc(doc(db, "stories", storyId));
      closeModal('storyViewModal');
      showToast('تم حذف الستوري');
  };

  window.openAddStory = function() {
      showBeautifulPrompt(
          '📸 إضافة ستوري',
          'أدخل  الصورة',
          'https://',
          async (url) => {
              if (!url || !url.startsWith('http')) {
                  showToast(' غير صالح', false);
                  return;
              }
              
              const newStory = {
                  userId: currentUserData?.userId,
                  username: currentUserData?.username,
                  emoji: currentUserData?.emoji,
                  avatarType: currentUserData?.avatarType,
                  avatarUrl: currentUserData?.avatarUrl,
                  imageUrl: url,
                  timestamp: Date.now(),
                  expiresAt: Date.now() + 86400000,
                  likes: 0,
                  likedBy: [],
                  comments: []
              };
              
              await addDoc(collection(db, "stories"), newStory);
              showToast('✨ تم نشر الستوري');
          }
      );
  };

  function calculateTrendingPosts() {
      const now = Date.now();
      const twentyFourHoursAgo = now - 86400000;
      
      const recentPosts = posts.filter(p => p.timestamp > twentyFourHoursAgo);
      
      const sorted = [...recentPosts].sort((a, b) => (b.likes || 0) - (a.likes || 0));
      
      const topPromoted = sorted.filter(p => (p.promotedUntil || 0) > now).slice(0, 3);
      const topOrganic = sorted.filter(p => !((p.promotedUntil || 0) > now)).slice(0, 3);
      
      return { topPromoted, topOrganic };
  }

  function renderPosts() {
    const container = document.getElementById('postsContainer');
    if (!container) return;
    
    let filtered = posts.filter(p => 
      (p.content || '').includes(searchTerm) || 
      (p.username || '').includes(searchTerm) || 
      (p.userId || '').includes(searchTerm)
    );
    
    if (filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:50px"><i class="fas fa-feather" style="font-size:45px;opacity:0.3"></i><p style="margin-top:15px;color:#64748b;">لا توجد منشورات</p></div>`;
      return;
    }

    const now = Date.now();
    const { topPromoted, topOrganic } = calculateTrendingPosts();
    
    const topPostIds = new Set([...topPromoted.map(p => p.id), ...topOrganic.map(p => p.id)]);
    
    const sorted = [...filtered].sort((a, b) => {
      if (topPostIds.has(a.id) && !topPostIds.has(b.id)) return -1;
      if (!topPostIds.has(a.id) && topPostIds.has(b.id)) return 1;
      
      const aPromo = (a.promotedUntil || 0) > now ? 1 : 0;
      const bPromo = (b.promotedUntil || 0) > now ? 1 : 0;
      if (aPromo !== bPromo) return bPromo - aPromo;
      
      const aFollowed = isFollowing(a.userId) ? 1 : 0;
      const bFollowed = isFollowing(b.userId) ? 1 : 0;
      if (aFollowed !== bFollowed) return bFollowed - aFollowed;
      
      return (b.timestamp || 0) - (a.timestamp || 0);
    });

    container.innerHTML = sorted.map((post, index) => {
      const isLiked = (post.likedBy || []).includes(currentUser?.uid);
      const isPromoted = (post.promotedUntil || 0) > now;
      const isOwner = post.userId === currentUserData?.userId;
      const followed = isFollowing(post.userId);
      const idClass = getIdClass(post.userId);
      const isVerified = post.verified || false;
      
      let trendBadge = '';
      let trendStyle = '';
      const promoIndex = topPromoted.findIndex(p => p.id === post.id);
      const organicIndex = topOrganic.findIndex(p => p.id === post.id);
      
      if (promoIndex !== -1) {
          const colors = ['#dc2626', '#10b981', '#3b82f6'];
          trendBadge = `<span class="trend-badge" style="background:${colors[promoIndex]};">🔥 ترند #${promoIndex+1}</span>`;
          trendStyle = `border: 4px solid ${colors[promoIndex]}; box-shadow: 0 0 20px ${colors[promoIndex]};`;
      } else if (organicIndex !== -1) {
          const colors = ['#dc2626', '#10b981', '#3b82f6'];
          trendBadge = `<span class="trend-badge" style="background:${colors[organicIndex]};">✨ الأفضل #${organicIndex+1}</span>`;
          trendStyle = `border: 4px solid ${colors[organicIndex]}; box-shadow: 0 0 20px ${colors[organicIndex]};`;
      }
      
      let mediaHtml = '';
      if (post.mediaUrl) {
          if (post.mediaType === 'image') {
              mediaHtml = `<div class="post-media"><img src="${post.mediaUrl}" onerror="this.style.display='none'"></div>`;
          } else if (post.mediaType === 'youtube') {
              mediaHtml = `<div class="post-media"><iframe src="${post.mediaUrl}" frameborder="0" allowfullscreen></iframe></div>`;
          }
      }
      
      return `
      <div class="post-card ${isPromoted ? 'promoted' : ''}" style="${trendStyle}">
        ${trendBadge}
        ${followed && !isOwner ? '<div class="follow-badge"><i class="fas fa-check"></i> متابَع</div>' : ''}
        <div class="post-header">
          <div class="post-avatar" onclick="window.openProfile('${post.userId}')" style="border-color: ${post.colors?.frame || '#fbbf24'};">${renderAvatar(post)}</div>
          <div class="post-user-details">
            <div class="post-username" onclick="window.openProfile('${post.userId}')" style="color:${post.colors?.name || '#0f172a'}">
              ${post.username || 'مستخدم'}
              ${isVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
              <span class="user-id-badge ${idClass}" style="background:${post.colors?.frame || '#fbbf24'};">#${post.userId || ''}</span>
            </div>
            <div class="post-time"><i class="far fa-calendar-alt"></i> ${post.timestamp ? new Date(post.timestamp).toLocaleDateString('ar-SA') : 'اليوم'}</div>
          </div>
          <div class="post-menu">
            <i class="fas fa-ellipsis-v" onclick="window.showPostMenu(event, '${post.id}')" style="cursor:pointer;"></i>
          </div>
        </div>
        <div class="post-content" style="color:${post.colors?.postText || post.colors?.text || '#334155'}">${post.content || ''}</div>
        ${mediaHtml}
        <div class="post-interactions">
          <div class="interact-btn ${isLiked ? 'liked' : ''}" onclick="window.toggleLike('${post.id}')"><i class="fas fa-heart"></i> <span>${post.likes || 0}</span></div>
          <div class="interact-btn" onclick="window.openComments('${post.id}')"><i class="fas fa-comment"></i> ${(post.comments || []).length}</div>
          <div class="interact-btn"><i class="fas fa-eye"></i> ${post.views || 0}</div>
          <div class="interact-btn" onclick="window.sharePost('${post.id}')"><i class="fas fa-share"></i> ${post.shares || 0}</div>
        </div>
      </div>`;
    }).join('');
  }

  window.sharePost = async function(postId) {

  };

      const file = new File([blob], 'post-image.jpg', { type: blob.type });
      shareData.files = [file];
    } catch (e) {
      console.log('تعذر تحميل الصورة');
    }
  }
  
  if (navigator.share) {

          <i class="fas fa-share-alt" style="font-size: 35px; color: white;"></i>
        </div>

      <div style="display: flex; gap: 10px;">

          <i class="fas fa-copy"></i> نسخ
        </button>
        <button id="closeShareBtn" style="flex: 1; background: #f1f5f9; border: none; padding: 14px; border-radius: 40px; color: #64748b; font-weight: 700; cursor: pointer;">
          <i class="fas fa-times"></i> إغلاق
        </button>
      </div>
    `;
    
    overlay.appendChild(shareBox);
    document.body.appendChild(overlay);
    
    // إضافة الأحداث للأزرار بعد إضافتها للـ DOM
    const copyBtn = shareBox.querySelector('#copyShareBtn');
    const closeBtn = shareBox.querySelector('#closeShareBtn');
    
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(shareText);
        showToast('📋 تم نسخ النص');
        await updateDoc(doc(db, "posts", postId), { shares: increment(1) });
      } catch (e) {
        showToast('❌ فشل النسخ', false);
      }
      overlay.remove();
    });
    
    closeBtn.addEventListener('click', () => {
      overlay.remove();
    });
    
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.remove();
    });
  }
};

window.acceptReport = async function(reportId, postId) {
  const reportRef = doc(db, "reports", reportId);
  const reportDoc = await getDoc(reportRef);
  const reportData = reportDoc.data();
  
  const newCount = (reportData.acceptedCount || 0) + 1;
  
  if (newCount >= 3) {
    // حذف المنشور فقط عند قبول 3 بلاغات
    try {
      await deleteDoc(doc(db, "posts", postId));
    } catch (e) {
      console.log('المنشور محذوف مسبقاً');
    }
    
    await updateDoc(reportRef, { 
      status: 'deleted', 
      acceptedCount: newCount 
    });
    
    showToast('✅ تم حذف المنشور لتجاوز ٣ بلاغات مقبولة');
  } else {
    // زيادة العداد فقط بدون حذف
    await updateDoc(reportRef, { 
      acceptedCount: newCount 
    });
    
    showToast(`✅ تم قبول البلاغ (${newCount}/3)`);
  }
  
  closeModal('reportsModal');
};

 window.reportPost = function(postId) {

    async (reason) => {
      if (!reason || reason.trim() === '') return;
      
      try {
        const reportsRef = collection(db, "reports");
        const q = query(reportsRef, where("postId", "==", postId), where("status", "==", "pending"));
        const reportsSnapshot = await getDocs(q);

          });

  );
};
  window.toggleLike = async function(postId) {
    if (!currentUser) return;
    const postRef = doc(db, "posts", postId);
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    
    const liked = post.likedBy || [];
    const isLiked = liked.includes(currentUser.uid);
    
    if (isLiked) {
        await updateDoc(postRef, { likedBy: arrayRemove(currentUser.uid), likes: increment(-1) });
    } else {
        await updateDoc(postRef, { likedBy: arrayUnion(currentUser.uid), likes: increment(1) });
        
        // ⭐ مكافأة الذهب: كل 3 لايكات = 1 ذهب لصاحب المنشور
        const newLikes = (post.likes || 0) + 1;
        
        // التحقق من أن اللايك من مضاعفات 3
        if (newLikes > 0 && newLikes % 3 === 0) {
            const ownerUserId = post.userId;
            
            try {
                // 🔍 الطريقة الأولى: البحث في users_by_id
                const usersByIdQuery = query(collection(db, "users_by_id"), where("__name__", "==", ownerUserId));
                const usersByIdSnapshot = await getDocs(usersByIdQuery);
                
                let ownerUid = null;
                
                if (!usersByIdSnapshot.empty) {
                    ownerUid = usersByIdSnapshot.docs[0].data().uid;
                } else {
                    // 🔍 الطريقة الثانية: البحث في users حيث userId = ownerUserId
                    const usersQuery = query(collection(db, "users"), where("userId", "==", ownerUserId));
                    const usersSnapshot = await getDocs(usersQuery);
                    
                    if (!usersSnapshot.empty) {
                        ownerUid = usersSnapshot.docs[0].id;
                    }
                }
                
                // 🔍 الطريقة الثالثة: إذا كان صاحب المنشور هو المستخدم الحالي
                if (!ownerUid && ownerUserId === currentUserData?.userId) {
                    ownerUid = currentUser.uid;
                }
                
                if (ownerUid) {
                    // إضافة ذهب لصاحب المنشور
                    const ownerResourcesRef = doc(db, "resources", ownerUid);
                    const ownerResourcesDoc = await getDoc(ownerResourcesRef);
                    
                    if (ownerResourcesDoc.exists()) {
                        const currentGold = ownerResourcesDoc.data().gold || 0;
                        await updateDoc(ownerResourcesRef, { gold: currentGold + 1 });
                    } else {
                        await setDoc(ownerResourcesRef, { gold: 1, elixir: 10, money: 1000, oil: 100 });
                    }
                    
                    // تحديث الموارد في الواجهة إذا كان المستفيد هو المستخدم الحالي
                    if (ownerUid === currentUser.uid) {
                        resources.gold = (resources.gold || 0) + 1;
                        updateResourcesUI();
                    }
                    
                    showToast(`🎉 ${post.username || 'صاحب المنشور'} ربح عملة ذهبية! (${newLikes} لايكات)`);
                    
                    // 🎵 صوت إشعار
                    playNotificationSound();
                } else {
                    console.log('❌ لم يتم العثور على معرف صاحب المنشور:', ownerUserId);
                }
                
            } catch (error) {
                console.error('❌ خطأ في إضافة الذهب:', error);
            }
        }
    }
};

      viewedPosts.add(postId);

  window.submitComment = async function() {
    const inp = document.getElementById('newCommentInput');
    if (!inp) return;
    const text = inp.value.trim();
    if (!text || !activePostId || !currentUser) return;
    
    const comment = {
      id: 'c' + Date.now() + Math.random().toString(36),
      userId: currentUserData?.userId || currentUser.uid.slice(0, 6),
      username: currentUserData?.username || 'مستخدم',
      emoji: currentUserData?.emoji || '😎',
      avatarType: currentUserData?.avatarType || 'emoji',
      avatarUrl: currentUserData?.avatarUrl || '',
      colors: currentUserData?.colors || {},
      verified: currentUserData?.verified || false,
      text: text,
      timestamp: Date.now()
    };
    
    await updateDoc(doc(db, "posts", activePostId), {
      comments: arrayUnion(comment)
    });
    
    inp.value = '';
    closeModal('commentsModal');
    showToast('تم إضافة التعليق');
  };

  window.deleteComment = async function(postId, commentId) {
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    const comment = post.comments?.find(c => c.id === commentId);
    if (comment) {
      await updateDoc(doc(db, "posts", postId), {
        comments: arrayRemove(comment)
      });
      showToast('تم حذف التعليق');
    }
  };

  window.promotePost = async function(postId) {
    const post = posts.find(p => p.id === postId);
    if (!post || post.userId !== currentUserData?.userId) return;
    
    showBeautifulPrompt(
        '📈 ترويج المنشور',
        `أدخل عدد الأيام (1 إكسير لليوم)\nالإكسير المتوفر: ${resources.elixir || 0}`,
        '1',
        async (days) => {
            const daysNum = parseInt(days);
            if (!daysNum || daysNum < 1) {
                showToast('❌ الرجاء إدخال رقم صحيح', false);
                return;
            }
            
            if ((resources.elixir || 0) < daysNum) {
                showToast('❌ إكسير غير كافٍ', false);
                return;
            }
            
            resources.elixir -= daysNum;
            await setDoc(doc(db, "resources", currentUser.uid), resources);
            
            await updateDoc(doc(db, "posts", postId), {
                promotedUntil: Date.now() + daysNum * 86400000
            });
            
            updateResourcesUI();
            showToast(`✨ تم ترويج المنشور لمدة ${daysNum} يوم`);
        }
    );
  };

  window.editPost = async function(postId) {
    const post = posts.find(p => p.id === postId);
    if (!post || post.userId !== currentUserData?.userId) return;
    
    showBeautifulPrompt(
        '✏️ تعديل المنشور',
        'قم بتعديل محتوى المنشور',
        post.content,
        async (newContent) => {
            if (newContent && newContent !== post.content) {
                await updateDoc(doc(db, "posts", postId), { content: newContent });
                showToast('✅ تم تعديل المنشور');
            }
        }
    );
  };

  window.publishPost = async function() {
    const content = document.getElementById('postText')?.value.trim();
    const mediaUrl = document.getElementById('postMediaUrl')?.value.trim();
    if (!content && !mediaUrl) {
        showToast('الرجاء كتابة نص أو إضافة  وسائط', false);
        return;
    }
    if (!currentUser) return;
    
    if (content.length > 500) {
      showToast('الحد الأقصى 500 حرف', false);
      return;
    }
    
    const promoDays = parseInt(document.getElementById('promoDays')?.value || '0');
    if (promoDays > 0 && (resources.elixir || 0) < promoDays) { 
      showToast('إكسير غير كافٍ', false); 
      return; 
    }
    
    if (promoDays > 0) {
      resources.elixir -= promoDays;
      await setDoc(doc(db, "resources", currentUser.uid), resources);
    }
    
    let mediaType = null;
    let finalMediaUrl = mediaUrl;
    if (mediaUrl) {
        if (mediaUrl.includes('youtube.com') || mediaUrl.includes('youtu.be')) {
            mediaType = 'youtube';
            // تحويل إلى  تضمين
            const videoId = mediaUrl.split('v=')[1]?.split('&')[0] || mediaUrl.split('/').pop();
            finalMediaUrl = `https://www.youtube.com/embed/${videoId}`;
        } else {
            mediaType = 'image';
        }
    }
    
    const newPost = {
      userId: currentUserData?.userId || currentUser.uid.slice(0, 6),
      username: currentUserData?.username || 'مستخدم',
      emoji: currentUserData?.emoji || '😎',
      avatarType: currentUserData?.avatarType || 'emoji',
      avatarUrl: currentUserData?.avatarUrl || '',
      colors: currentUserData?.colors || { frame: '#fbbf24', name: '#0f172a', id: '#8b5cf6', postText: '#334155', commentText: '#475569' },
      verified: currentUserData?.verified || false,
      content: content,
      mediaUrl: finalMediaUrl,
      mediaType: mediaType,
      timestamp: Date.now(),
      likes: 0,
      likedBy: [],
      comments: [],
      views: 0,
      shares: 0,
      reports: [],
      promotedUntil: promoDays > 0 ? Date.now() + promoDays * 86400000 : 0
    };
    
    await addDoc(collection(db, "posts"), newPost);
    
    updateResourcesUI();
    closeModal('publishModal');
    document.getElementById('postText').value = '';
    document.getElementById('postMediaUrl').value = '';
    showToast('✨ تم نشر منشورك');
  };

  };

// فلترة المنشورات حسب النوع (تظهر فقط في حسابك) مع تحديث التحديد
window.filterProfilePosts = function(type) {
    const userId = activeProfileUserId;
    let filteredPosts = [];
    
    // تحديث شكل الأيقونات (إزالة التحديد من الكل ثم إضافته للنشط)
    const tabs = document.querySelectorAll('#profileTabsContainer div');
    tabs.forEach(tab => {
        tab.style.borderBottom = 'none';
        tab.style.color = '#aaa';
    });
    
    // تحديد الأيقونة النشطة
    if (type === 'all') {
        filteredPosts = posts.filter(p => p.userId === userId);
        tabs[0].style.borderBottom = '2px solid #fbbf24';
        tabs[0].style.color = '#fff';
        document.getElementById('postsSectionTitle').innerHTML = '<i class="fas fa-th"></i> منشوراتي';
    } else if (type === 'liked') {
        filteredPosts = posts.filter(p => (p.likedBy || []).includes(currentUser?.uid));
        tabs[1].style.borderBottom = '2px solid #fbbf24';
        tabs[1].style.color = '#fff';
        document.getElementById('postsSectionTitle').innerHTML = '<i class="fas fa-heart"></i> المنشورات التي أعجبتني';
    } else if (type === 'shared') {
        filteredPosts = posts.filter(p => (p.sharedBy || []).includes(currentUser?.uid));
        tabs[2].style.borderBottom = '2px solid #fbbf24';
        tabs[2].style.color = '#fff';
        document.getElementById('postsSectionTitle').innerHTML = '<i class="fas fa-retweet"></i> المنشورات التي شاركتها';
    }
    
    const container = document.getElementById('profilePostsContainer');
    if (!container) return;
    
    // تحديث عداد المنشورات
    const countSpan = document.getElementById('profilePostsCount');
    if (countSpan) countSpan.textContent = filteredPosts.length;
    
    if (filteredPosts.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#aaa;padding:30px;">لا توجد منشورات</p>';
        return;
    }
    
    const isOwner = userId === currentUserData?.userId;
    
    container.innerHTML = filteredPosts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).map(post => {
        const idClass = getIdClass(post.userId);
        const isVerified = post.verified || false;
        let mediaHtml = '';
        if (post.mediaUrl) {
            if (post.mediaType === 'image') {
                mediaHtml = `<div class="post-media"><img src="${post.mediaUrl}" onerror="this.style.display='none'"></div>`;
            } else if (post.mediaType === 'youtube') {
                mediaHtml = `<div class="post-media"><iframe src="${post.mediaUrl}" frameborder="0" allowfullscreen></iframe></div>`;
            }
        }
        return `
        <div class="post-card" style="margin-bottom:12px; background:#111; color:#fff;">
          <div class="post-header">
            <div class="post-avatar" style="border-color:${post.colors?.frame || '#fbbf24'};" onclick="window.openProfile('${post.userId}')">${renderAvatar(post)}</div>
            <div style="flex:1;">
              <div>
                <strong style="color:#fff; cursor:pointer;" onclick="window.openProfile('${post.userId}')">${post.username}</strong>
                ${isVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}

              </div>
              <small style="color:#aaa;">${post.timestamp ? new Date(post.timestamp).toLocaleString('ar-SA') : ''}</small>
            </div>
            ${isOwner ? `<div class="post-menu">
              <i class="fas fa-trash" onclick="window.deletePost('${post.id}')"></i>
              <i class="fas fa-edit" onclick="window.editPost('${post.id}')"></i>
            </div>` : ''}
          </div>
          <div style="color:#ddd; margin: 10px 0;">${post.content}</div>
          ${mediaHtml}
          <div class="post-interactions" style="margin-top:10px;">
            <div class="interact-btn ${(post.likedBy||[]).includes(currentUser?.uid) ? 'liked' : ''}" onclick="window.toggleLike('${post.id}')"><i class="fas fa-heart"></i> ${post.likes||0}</div>

  window.changePassword = async function() {
    const currentPass = document.getElementById('currentPassword')?.value;
    const newPass = document.getElementById('newPassword')?.value;
    const confirmPass = document.getElementById('confirmPassword')?.value;
    
    if (!currentPass || !newPass || !confirmPass) {
      showToast('جميع الحقول مطلوبة', false);
      return;
    }
    
    if (newPass !== confirmPass) {
      showToast('كلمة المرور الجديدة غير متطابقة', false);
      return;
    }
    
    if (newPass.length < 6) {
      showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', false);
      return;
    }
    
    try {
      const credential = EmailAuthProvider.credential(currentUser.email, currentPass);
      await reauthenticateWithCredential(currentUser, credential);
      await updatePassword(currentUser, newPass);
      showToast('✅ تم تغيير كلمة المرور بنجاح');
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';

      showToast('❌ كلمة المرور الحالية غير صحيحة', false);

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadUserData(user.uid);
      
      if (!currentUserData?.userId) {
        const userId = user.uid.slice(0, 6);
        currentUserData = { ...currentUserData, userId: userId };
        await setDoc(doc(db, "users", user.uid), currentUserData, { merge: true });
        await setDoc(doc(db, "users_by_id", userId), { uid: user.uid });
      }
      
      subscribeToPosts();
      subscribeToStories();
      subscribeToUnreadMessages();
      
      const messagesQuery = query(collection(db, "chats"));
      onSnapshot(messagesQuery, (snapshot) => {
        let hasNewMessage = false;
        snapshot.docChanges().forEach(change => {
          if (change.type === 'modified') {
            const data = change.doc.data();

// متغير عام لنوع الستوري الحالي
var currentStoryType = 'image';

// استخراج معرف يوتيوب
window.extractYoutubeId = function(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
};

// تغيير نوع الستوري
window.setStoryType = function(type) {
    currentStoryType = type;
    
    document.querySelectorAll('.story-type-btn').forEach(btn => {
        btn.style.background = '#1a1a2e';
        btn.style.color = '#fff';
    });
    
    const activeBtn = document.getElementById(`storyType${type.charAt(0).toUpperCase() + type.slice(1)}`);
    if (activeBtn) {
        activeBtn.style.background = '#fbbf24';
        activeBtn.style.color = '#000';
    }
    
    const label = document.getElementById('storyUrlLabel');
    const input = document.getElementById('storyUrlInput');
    
    if (label && input) {
        if (type === 'image') {
            label.innerHTML = '<i class="fas fa-image"></i>  الصورة';
            input.placeholder = 'https://example.com/image.jpg';
        } else if (type === 'youtube') {
            label.innerHTML = '<i class="fab fa-youtube" style="color:#ff0000;"></i>  يوتيوب';
            input.placeholder = 'https://youtube.com/watch?v=...';
        } else if (type === 'tiktok') {
            label.innerHTML = '<i class="fab fa-tiktok"></i>  تيك توك';
            input.placeholder = 'https://tiktok.com/@user/video/...';
        } else if (type === 'facebook') {
            label.innerHTML = '<i class="fab fa-facebook" style="color:#1877f2;"></i>  فيسبوك';
            input.placeholder = 'https://facebook.com/watch?v=...';
        }
    }
};

// معاينة الستوري
window.previewStory = function() {
    const text = document.getElementById('storyTextInput')?.value || '';
    const url = document.getElementById('storyUrlInput')?.value || '';
    const previewDiv = document.getElementById('storyPreview');

        previewDiv.innerHTML = '<p style="color: #ef4444; margin: 20px 0;">⚠️ الرجاء إدخال رابط</p>';
        return;
    }
    
    let mediaHtml = '';
    
    if (currentStoryType === 'image') {
        mediaHtml = `<img src="${url}" style="max-width:100%; max-height:200px; border-radius:15px;" onerror="this.parentElement.innerHTML='<p style=\'color:#ef4444; margin:20px 0;\'>❌ فشل تحميل الصورة</p>'">`;

        const youtubeId = window.extractYoutubeId(url);

            mediaHtml = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${youtubeId}" frameborder="0" allowfullscreen style="border-radius:15px;"></iframe>`;

    } else if (currentStoryType === 'facebook') {
        mediaHtml = `<div style="background:#111; padding:20px; border-radius:15px;"><i class="fab fa-facebook" style="font-size:50px; color:#1877f2;"></i><p style="margin-top:10px; color:#fff;">📺 فيديو فيسبوك</p><p style="font-size:12px; color:#aaa; word-break:break-all;">${url}</p></div>`;

// نشر الستوري
window.publishStory = async function() {
    if (!currentUserData) {

        return;
    }
    
    const text = document.getElementById('storyTextInput')?.value.trim() || '';
    const url = document.getElementById('storyUrlInput')?.value.trim() || '';
    
    if (!url) {
        showToast('الرجاء إدخال رابط', false);
        return;
    }
    
    if (currentStoryType === 'youtube' && !window.extractYoutubeId(url)) {
        showToast('رابط يوتيوب غير صالح', false);
        return;
    }
    
    const newStory = {
        userId: currentUserData?.userId || currentUser?.uid?.slice(0, 6),
        username: currentUserData?.username || 'مستخدم',
        emoji: currentUserData?.emoji || '😎',
        avatarType: currentUserData?.avatarType || 'emoji',
        avatarUrl: currentUserData?.avatarUrl || '',
        colors: currentUserData?.colors || { frame: '#fbbf24' },
        text: text,
        mediaUrl: url,
        mediaType: currentStoryType,
        timestamp: Date.now(),
        expiresAt: Date.now() + 86400000,
        likes: 0,
        likedBy: [],
        comments: [],
        views: []
    };
    
    try {
        await addDoc(collection(db, "stories"), newStory);
        showToast('✨ تم نشر الستوري بنجاح');
        closeModal('createStoryModal');
        
        const textInput = document.getElementById('storyTextInput');
        const urlInput = document.getElementById('storyUrlInput');
        const previewDiv = document.getElementById('storyPreview');
        
        if (textInput) textInput.value = '';
        if (urlInput) urlInput.value = '';

        window.setStoryType('image');
    } catch (error) {

    }
};

// تسجيل مشاهدة الستوري
window.registerStoryView = async function(storyId) {
    if (!currentUserData) return;
    
    const storyRef = doc(db, "stories", storyId);
    const story = stories.find(s => s.id === storyId);
    if (!story) return;
    
    const views = story.views || [];
    const userView = views.find(v => v.userId === currentUserData.userId);
    
    if (!userView) {
        const newView = {
            userId: currentUserData.userId || currentUser?.uid?.slice(0, 6),
            username: currentUserData.username || 'مستخدم',
            emoji: currentUserData.emoji || '😎',
            avatarType: currentUserData.avatarType || 'emoji',
            avatarUrl: currentUserData.avatarUrl || '',
            timestamp: Date.now()
        };
        
        try {
            await updateDoc(storyRef, {
                views: arrayUnion(newView)
            });
        } catch (error) {
            console.error('خطأ في تسجيل المشاهدة:', error);
        }
    }
};

// دالة مساعدة لعرض التعليقات مع أزرار التعديل والحذف
function renderStoryComments(comments, storyId) {
    if (!comments || comments.length === 0) {
        return '<p style="color:#666; text-align:center; padding:20px;">لا توجد تعليقات</p>';
    }
    
    return comments.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).map(c => {
        const isCommentOwner = c.userId === (currentUserData?.userId || currentUser?.uid?.slice(0, 6));
        const commentTime = c.timestamp ? new Date(c.timestamp).toLocaleString('ar-SA', { 
            hour: '2-digit', 
            minute: '2-digit',
            day: 'numeric',
            month: 'numeric'
        }) : 'الآن';
        
        return `
        <div style="display:flex; gap:10px; margin-bottom:12px; padding:10px; background:#1a1a2e; border-radius:12px;" id="storyComment_${c.id}">
            <div style="flex-shrink:0; cursor:pointer;" onclick="window.openProfile('${c.userId}')">
                <div style="width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid ${c.colors?.frame || '#fbbf24'};">

                </div>
            </div>
            <div style="flex:1;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                    <span style="font-weight:bold; color:#fff; cursor:pointer;" onclick="window.openProfile('${c.userId}')">${c.username || 'مستخدم'}</span>
                    <span style="font-size:10px; color:#666;"><i class="far fa-clock"></i> ${commentTime}</span>
                    ${isCommentOwner ? `
                        <div style="margin-right:auto; display:flex; gap:5px;">
                            <i class="fas fa-edit" onclick="window.editStoryComment('${storyId}', '${c.id}')" style="cursor:pointer; color:#fbbf24; font-size:12px;" title="تعديل"></i>
                            <i class="fas fa-trash" onclick="window.deleteStoryComment('${storyId}', '${c.id}')" style="cursor:pointer; color:#ef4444; font-size:12px;" title="حذف"></i>

                <p style="color:#ddd; margin:0; font-size:14px;" id="storyCommentText_${c.id}">${c.text}</p>
            </div>
        </div>
        `;
    }).join('');
}

window.updateStory = async function(storyId) {

    if (!url) {
        showToast('الرجاء إدخال رابط', false);

            updatedAt: Date.now()

        showToast('✅ تم تحديث الستوري');

        'اكتب تعليقك هنا...',
        '',
        (text) => {
            if (text && text.trim()) {
                window.submitStoryComment(storyId, text.trim());
            }
        }
    );
};

// إرسال تعليق على ستوري
window.submitStoryComment = async function(storyId, text) {
    if (!currentUserData) {
        showToast('يجب تسجيل الدخول', false);
        return;
    }
    
    const commentId = 'sc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    
    const newComment = {
        id: commentId,
        username: currentUserData?.username || 'مستخدم',
        userId: currentUserData?.userId || currentUser?.uid?.slice(0, 6),
        emoji: currentUserData?.emoji || '😎',
        avatarType: currentUserData?.avatarType || 'emoji',
        avatarUrl: currentUserData?.avatarUrl || '',
        colors: currentUserData?.colors || { frame: '#fbbf24' },
        text: text,
        timestamp: Date.now()
    };
    
    try {
        await updateDoc(doc(db, "stories", storyId), {
            comments: arrayUnion(newComment)
        });
        showToast('✅ تم إضافة التعليق');
        
        // تحديث قائمة التعليقات في الواجهة
        setTimeout(() => {
            const story = stories.find(s => s.id === storyId);
            if (story) {
                const commentsList = document.getElementById(`storyCommentsList_${storyId}`);
                if (commentsList) {
                    commentsList.innerHTML = renderStoryComments(story.comments || [], storyId);
                }
                
                const commentsCount = document.querySelector(`#storyComments_${storyId} h4`);
                if (commentsCount) {
                    commentsCount.innerHTML = `<i class="fas fa-comments"></i> التعليقات (${(story.comments || []).length})`;
                }
            }
        }, 300);
        
    } catch (error) {
        console.error('خطأ في إضافة التعليق:', error);
        showToast('❌ فشل إضافة التعليق', false);
    }
};

// تعديل تعليق
window.editStoryComment = function(storyId, commentId) {
    const story = stories.find(s => s.id === storyId);
    if (!story) return;
    
    const comment = (story.comments || []).find(c => c.id === commentId);
    if (!comment) return;
    
    showBeautifulPrompt(
        '✏️ تعديل التعليق',
        'عدل تعليقك',
        comment.text,
        async (newText) => {
            if (!newText || newText.trim() === '') return;
            
            try {
                // حذف التعليق القديم
                await updateDoc(doc(db, "stories", storyId), {
                    comments: arrayRemove(comment)
                });
                
                // إضافة التعليق المعدل
                const updatedComment = { ...comment, text: newText.trim(), edited: true };
                await updateDoc(doc(db, "stories", storyId), {
                    comments: arrayUnion(updatedComment)
                });
                
                showToast('✅ تم تعديل التعليق');
                
                // تحديث الواجهة
                setTimeout(() => {
                    const updatedStory = stories.find(s => s.id === storyId);
                    if (updatedStory) {
                        const commentsList = document.getElementById(`storyCommentsList_${storyId}`);
                        if (commentsList) {
                            commentsList.innerHTML = renderStoryComments(updatedStory.comments || [], storyId);
                        }
                    }
                }, 300);
                
            } catch (error) {
                console.error('خطأ في تعديل التعليق:', error);
                showToast('❌ فشل التعديل', false);
            }
        }
    );
};

// حذف تعليق
window.deleteStoryComment = async function(storyId, commentId) {
    const confirmed = confirm('هل أنت متأكد من حذف التعليق؟');
    if (!confirmed) return;
    
    const story = stories.find(s => s.id === storyId);
    if (!story) return;
    
    const comment = (story.comments || []).find(c => c.id === commentId);
    if (!comment) return;
    
    try {
        await updateDoc(doc(db, "stories", storyId), {
            comments: arrayRemove(comment)
        });
        
        showToast('✅ تم حذف التعليق');
        
        // تحديث الواجهة
        setTimeout(() => {
            const updatedStory = stories.find(s => s.id === storyId);
            if (updatedStory) {
                const commentsList = document.getElementById(`storyCommentsList_${storyId}`);
                if (commentsList) {
                    commentsList.innerHTML = renderStoryComments(updatedStory.comments || [], storyId);
                }
                
                const commentsCount = document.querySelector(`#storyComments_${storyId} h4`);
                if (commentsCount) {
                    commentsCount.innerHTML = `<i class="fas fa-comments"></i> التعليقات (${(updatedStory.comments || []).length})`;
                }
            }
        }, 300);
        
    } catch (error) {
        console.error('خطأ في حذف التعليق:', error);
        showToast('❌ فشل الحذف', false);
    }
};

// إعجاب على ستوري
window.toggleStoryLike = async function(storyId) {
    if (!currentUser) {
        showToast('يجب تسجيل الدخول', false);
        return;
    }
    
    const storyRef = doc(db, "stories", storyId);
    const story = stories.find(s => s.id === storyId);
    if (!story) return;
    
    const likedBy = story.likedBy || [];
    
    try {
        if (likedBy.includes(currentUser.uid)) {
            await updateDoc(storyRef, { 
                likedBy: arrayRemove(currentUser.uid), 
                likes: increment(-1) 
            });
        } else {
            await updateDoc(storyRef, { 
                likedBy: arrayUnion(currentUser.uid), 
                likes: increment(1) 
            });
        }
        
        const likesSpan = document.getElementById(`storyLikes_${storyId}`);
        if (likesSpan) {
            const newLikes = (story.likes || 0) + (likedBy.includes(currentUser.uid) ? -1 : 1);
            likesSpan.textContent = newLikes;
        }
    } catch (error) {
        console.error('خطأ في الإعجاب:', error);
        showToast('❌ فشل الإعجاب', false);
    }
};

// تحديث عرض الستوريات في الصف الرئيسي
window.renderStoriesRow = function() {
    const container = document.getElementById('storiesContainer');
    if (!container) return;
    
    const followingList = followers[currentUser?.uid] || [];
    const filteredStories = stories.filter(s => followingList.includes(s.userId) || s.userId === currentUserData?.userId);
    
    if (filteredStories.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    container.innerHTML = filteredStories.slice(0, 10).map(story => {
        let typeIcon = '';
        if (story.mediaType === 'youtube') typeIcon = '<i class="fab fa-youtube" style="color:#ff0000; font-size:10px; margin-left:3px;"></i>';
        else if (story.mediaType === 'tiktok') typeIcon = '<i class="fab fa-tiktok" style="font-size:10px; margin-left:3px;"></i>';
        else if (story.mediaType === 'facebook') typeIcon = '<i class="fab fa-facebook" style="color:#1877f2; font-size:10px; margin-left:3px;"></i>';
        
        return `
        <div class="story-item" onclick="window.viewStory('${story.id}')">
            <div class="story-avatar">
                ${story.avatarType === 'image' && story.avatarUrl ? `<img src="${story.avatarUrl}">` : `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#1e293b;border-radius:50%;color:white;font-size:30px;">${story.emoji || '👤'}</span>`}
            </div>
            <span class="story-name">${story.username || 'مستخدم'} ${typeIcon}</span>
        </div>
        `;
    }).join('');
};

// تحديث ستوريات الملف الشخصي
window.renderProfileStories = function(userId) {
    const container = document.getElementById('profileStoriesContainer');
    if (!container) return;
    
    const followingList = followers[currentUser?.uid] || [];
    const isOwnProfile = userId === currentUserData?.userId;
    
    let filteredStories;
    if (isOwnProfile) {
        filteredStories = stories.filter(s => followingList.includes(s.userId) || s.userId === userId);
    } else {
        filteredStories = stories.filter(s => s.userId === userId);
    }
    
    if (filteredStories.length === 0) {
        container.innerHTML = '<p style="color:#666; text-align:center; padding:15px;">لا توجد ستوريات</p>';
        return;
    }
    
    container.innerHTML = filteredStories.map(story => {
        return `
        <div class="story-item" onclick="window.viewStory('${story.id}')">
            <div class="story-avatar">
                ${story.avatarType === 'image' && story.avatarUrl ? `<img src="${story.avatarUrl}">` : `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#1e293b;border-radius:50%;color:white;font-size:30px;">${story.emoji || '👤'}</span>`}
            </div>
            <span class="story-name">${story.username || 'مستخدم'}</span>
        </div>
        `;
    }).join('');
};
